<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Web Game</title>
    <style>
        /* עיצוב בסיסי של העמוד כדי שהמשחק יהיה באמצע */
        body { 
            margin: 0; 
            background: #222; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: white; 
            font-family: Arial, sans-serif; 
        }
        /* עיצוב מסגרת המשחק */
        canvas { 
            background: #87CEEB; /* צבע שמיים תכלת */
            box-shadow: 0 0 20px rgba(0,0,0,0.8); 
            border-radius: 10px; 
        }
        /* תצוגת הניקוד */
        #ui { 
            position: absolute; 
            top: 20px; 
            font-size: 30px; 
            font-weight: bold; 
            text-shadow: 2px 2px 0px #000; 
        }
    </style>
</head>
<body>

    <div id="ui">Score: <span id="score">0</span></div>
    
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");

        // משתני מערכת בסיסיים
        let score = 0;
        const gravity = 0.6;   // כוח המשיכה
        const friction = 0.8;  // חיכוך (כדי שהשחקן יחליק קצת לפני עצירה)

        // נתוני השחקן שלנו
        const player = {
            x: 50, y: 300, width: 30, height: 30,
            color: "#4CAF50", // ירוק
            velX: 0, velY: 0,
            speed: 4, jumpStrength: 13,
            grounded: false
        };

        // מעקב אחרי מקשים נלחצים
        const keys = {};
        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        // בניית השלב - רצפות ופלטפורמות
        const platforms = [
            { x: 0, y: 350, width: 800, height: 50, color: "#8B4513" }, // רצפה מרכזית
            { x: 200, y: 250, width: 100, height: 20, color: "#A0522D" }, // פלטפורמה 1
            { x: 400, y: 170, width: 100, height: 20, color: "#A0522D" }, // פלטפורמה 2
            { x: 600, y: 250, width: 100, height: 20, color: "#A0522D" }  // פלטפורמה 3
        ];

        // מיקומי המטבעות
        const coins = [
            { x: 240, y: 210, width: 20, height: 20, collected: false },
            { x: 440, y: 130, width: 20, height: 20, collected: false },
            { x: 640, y: 210, width: 20, height: 20, collected: false },
            { x: 700, y: 310, width: 20, height: 20, collected: false }
        ];

        // אויב אחד שזז ימינה ושמאלה
        const enemy = { 
            x: 350, y: 320, width: 30, height: 30, color: "#FF0000", // אדום
            velX: 2, startX: 350, range: 100 
        };

        // פונקציה שבודקת התנגשות בין שני מרובעים
        function checkCollision(r1, r2) {
            return r1.x < r2.x + r2.width && 
                   r1.x + r1.width > r2.x && 
                   r1.y < r2.y + r2.height && 
                   r1.y + r1.height > r2.y;
        }

        // הלוגיקה והפיזיקה של המשחק (מתעדכן כל פריים)
        function update() {
            // תזוזה שמאלה וימינה
            if (keys["ArrowRight"]) player.velX += 1;
            if (keys["ArrowLeft"]) player.velX -= 1;
            
            // קפיצה (רק אם השחקן נוגע ברצפה)
            if ((keys["Space"] || keys["ArrowUp"]) && player.grounded) {
                player.velY = -player.jumpStrength;
                player.grounded = false;
            }

            // הפעלת חיכוך וכוח משיכה
            player.velX *= friction;
            player.velY += gravity;

            player.x += player.velX;
            player.y += player.velY;

            player.grounded = false;

            // התנגשות עם פלטפורמות (מלמעלה)
            for (let p of platforms) {
                if (checkCollision(player, p)) {
                    if (player.velY > 0 && player.y + player.height - player.velY <= p.y) {
                        player.grounded = true;
                        player.velY = 0;
                        player.y = p.y - player.height;
                    }
                }
            }

            // חסימה מגבולות המסך
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            
            // אם נופלים לתהום - חוזרים להתחלה
            if (player.y > canvas.height) {
                player.x = 50; player.y = 300; player.velY = 0;
            }

            // תנועת האויב
            enemy.x += enemy.velX;
            if (Math.abs(enemy.x - enemy.startX) > enemy.range) enemy.velX *= -1; // הופך כיוון

            // התנגשות עם אויב
            if (checkCollision(player, enemy)) {
                // בדיקה אם קפצנו לו על הראש
                if (player.velY > 0 && player.y + player.height - player.velY <= enemy.y + 15) {
                    enemy.x = -1000; // מעלים את האויב
                    player.velY = -10; // קפיצת ניצחון קטנה באוויר
                    score += 50;
                } else {
                    // נפגענו - חזרה להתחלה ואיבוד נקודות
                    player.x = 50; player.y = 300; player.velY = 0;
                    score = Math.max(0, score - 20);
                }
            }

            // איסוף מטבעות
            for (let c of coins) {
                if (!c.collected && checkCollision(player, c)) {
                    c.collected = true; // המטבע נאסף
                    score += 10;
                }
            }

            // עדכון הניקוד במסך
            scoreEl.innerText = score;
        }

        // ציור המשחק על המסך (מתעדכן כל פריים)
        function draw() {
            // ניקוי המסך הקודם
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ציור פלטפורמות
            for (let p of platforms) {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.width, p.height);
            }

            // ציור מטבעות (עיגולים צהובים)
            ctx.fillStyle = "#FFD700";
            for (let c of coins) {
                if (!c.collected) {
                    ctx.beginPath();
                    ctx.arc(c.x + c.width/2, c.y + c.height/2, c.width/2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // ציור אויב
            ctx.fillStyle = enemy.color;
            ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);

            // ציור שחקן
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // קריאה לפריים הבא
            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        // התחלת המשחק
        draw();
    </script>
</body>
</html>
