<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer Ultimate - The Complete Edition</title>
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: Arial, sans-serif; }
        #game-container { box-shadow: 0 0 30px rgba(0,0,0,0.8); border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        // --- מערכת צלילים מובנית ---
        const SoundEngine = {
            ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); },
            play(type) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination); const now = this.ctx.currentTime;
                if (type === 'jump') { osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(600, now + 0.1); gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); } 
                else if (type === 'coin') { osc.type = 'sine'; osc.frequency.setValueAtTime(900, now); osc.frequency.setValueAtTime(1200, now + 0.05); gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2); osc.start(); osc.stop(now + 0.2); } 
                else if (type === 'hit') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.linearRampToValueAtTime(20, now + 0.3); gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); } 
                else if (type === 'shoot') { osc.type = 'triangle'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.1); gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); }
            }
        };

        const config = { type: Phaser.AUTO, width: 800, height: 600, parent: 'game-container', physics: { default: 'arcade', arcade: { gravity: { y: 1000 }, debug: false } }, scene: { create: create, update: update } };
        const game = new Phaser.Game(config);
        
        let player, ground, platforms, mysteryBlocks, powerUps, enemies, boss, fireballs, springs, healSprings, iceballs, icePowerItem, coinsGroup, fakePlat;
        let cursors, keys, restartKey, shootKey, dashKey, coinRainKey, slowMoKey;
        let score = 0, health = 3, bossHealth = 10, gameActive = false, isInvincible = false, currentSpeed = 250, hasIcePower = false;
        let lastShotTime = 0, canDoubleJump = false, canDash = true, usedCoinRain = false, isSlowMo = false, reverseControls = false;
        let scoreText, healthText, bossHealthText, centerText;
        let clouds = [];

        function createTextures(scene) {
            let g = scene.make.graphics({ x: 0, y: 0, add: false });
            g.fillStyle(0x00FF00); g.fillRect(0, 0, 32, 32); g.generateTexture('playerTex', 32, 32); g.clear();
            g.fillStyle(0x8B4513); g.fillRect(0, 0, 400, 40); g.generateTexture('groundTex', 400, 40); g.clear();
            g.fillStyle(0xDEB887); g.fillRect(0, 0, 150, 20); g.generateTexture('platTex', 150, 20); g.clear();
            g.fillStyle(0xFF8C00); g.fillRect(0, 0, 40, 40); g.generateTexture('blockTex', 40, 40); g.clear();
            g.fillStyle(0xFFFFFF); g.fillRect(0, 0, 20, 20); g.generateTexture('powerTex', 20, 20); g.clear();
            g.fillStyle(0xFF0000); g.fillRect(0, 0, 100, 100); g.generateTexture('bossTex', 100, 100); g.clear();
            g.fillStyle(0xFFFFFF); g.fillCircle(4, 4, 4); g.generateTexture('particleTex', 8, 8); g.clear();
            g.fillStyle(0xFFFFFF, 0.5); g.fillCircle(50, 20, 20); g.fillCircle(30, 30, 20); g.fillCircle(70, 30, 20); g.generateTexture('cloudTex', 100, 50); g.clear();
            g.fillStyle(0x00FFFF); g.fillCircle(8, 8, 8); g.generateTexture('iceTex', 16, 16); g.clear();
            g.fillStyle(0x00FFFF); g.fillRect(0, 0, 24, 24); g.generateTexture('crystalTex', 24, 24); g.clear();
            g.fillStyle(0x32CD32); g.fillRect(0, 0, 32, 16); g.generateTexture('springTex', 32, 16); g.clear();
            g.fillStyle(0x0000FF); g.fillRect(0, 0, 32, 16); g.generateTexture('healSpringTex', 32, 16); g.clear();
            g.fillStyle(0xFFD700); g.fillCircle(8, 8, 8); g.generateTexture('coinTex', 16, 16); g.clear();
        }

        function explodeParticles(scene, x, y, color, qty = 15) {
            let emitter = scene.add.particles(x, y, 'particleTex', { speed: { min: -150, max: 150 }, angle: { min: 0, max: 360 }, scale: { start: 1, end: 0 }, tint: color, lifespan: 600, gravityY: 300, quantity: qty, emitting: false });
            emitter.explode();
        }

        function killBoss(scene, b) {
            explodeParticles(scene, b.x, b.y, 0xFF0000, 40); b.setData('isAlive', false); b.setTint(0x555555); b.body.enable = false;
            gameActive = false; centerText.setText('הבסת את הבוס!\nR למשחק חדש').setVisible(true).setFill('#00FF00'); 
        }

        function create() {
            score = 0; health = 3; bossHealth = 10; gameActive = false; isInvincible = false; currentSpeed = 250; hasIcePower = false;
            lastShotTime = 0; usedCoinRain = false; isSlowMo = false; reverseControls = false; this.physics.world.timeScale = 1;

            this.physics.world.setBounds(0, 0, 3200, 600); this.cameras.main.setBounds(0, 0, 3200, 600).setBackgroundColor('#4CA1AF'); 
            createTextures(this);

            clouds = [];
            for(let i=0; i<15; i++) { let cloud = this.add.image(Phaser.Math.Between(0, 3200), Phaser.Math.Between(50, 250), 'cloudTex'); cloud.setScrollFactor(0.3); clouds.push(cloud); }

            ground = this.physics.add.staticGroup(); for (let x = 0; x < 3200; x += 400) ground.create(x + 200, 580, 'groundTex');

            platforms = this.physics.add.staticGroup();
            [500, 900, 2000].forEach((x, i) => { let p = platforms.create(x, 450 - (i*30), 'platTex'); p.body.checkCollision.down = false; p.body.checkCollision.left = false; p.body.checkCollision.right = false; });

            // פלטפורמת המלכודת
            fakePlat = this.physics.add.sprite(1300, 390, 'platTex'); fakePlat.body.allowGravity = false; fakePlat.setImmovable(true);

            // פלטפורמת הענן לכוח הקרח
            let secretPlat = platforms.create(1700, 100, 'platTex'); secretPlat.body.checkCollision.down = false; secretPlat.body.checkCollision.left = false; secretPlat.body.checkCollision.right = false;
            icePowerItem = this.physics.add.sprite(1700, 50, 'crystalTex'); icePowerItem.body.allowGravity = false;
            
            springs = this.physics.add.staticGroup(); springs.create(1700, 550, 'springTex');
            healSprings = this.physics.add.staticGroup(); healSprings.create(2500, 550, 'healSpringTex'); 

            mysteryBlocks = this.physics.add.staticGroup();
            [[450, 300], [900, 200], [1400, 300]].forEach(pos => mysteryBlocks.create(pos[0], pos[1], 'blockTex').setData('used', false));

            powerUps = this.physics.add.group(); fireballs = this.physics.add.group({ allowGravity: false }); iceballs = this.physics.add.group({ allowGravity: false }); coinsGroup = this.physics.add.group(); enemies = this.physics.add.group();

            [[600, 500], [1100, 500], [1500, 500], [2300, 500]].forEach(pos => { enemies.create(pos[0], pos[1], 'playerTex').setTint(0x800080).setVelocityX(100).setBounceX(1).setCollideWorldBounds(true); });

            player = this.physics.add.sprite(100, 450, 'playerTex').setBounce(0.1).setCollideWorldBounds(true); this.cameras.main.startFollow(player, true, 0.05, 0.05);
            
            // --- הבוס הגדול ---
            boss = this.physics.add.sprite(2900, 400, 'bossTex').setBounce(0.2).setCollideWorldBounds(true).setData('isAlive', true).setData('frozen', false).setData('enraged', false);

            this.physics.add.collider(player, ground); this.physics.add.collider(player, platforms); this.physics.add.collider(enemies, ground); this.physics.add.collider(boss, ground); this.physics.add.collider(powerUps, [ground, platforms]); this.physics.add.collider(coinsGroup, [ground, platforms]);
            
            // מלכודת שבירה
            this.physics.add.collider(player, fakePlat, (p, f) => { SoundEngine.play('hit'); explodeParticles(this, f.x, f.y, 0xDEB887, 20); f.destroy(); });

            // מקפצות
            this.physics.add.collider(player, springs, (p, s) => { p.setVelocityY(-1100); SoundEngine.play('coin'); this.tweens.add({ targets: s, scaleY: 0.5, duration: 50, yoyo: true }); });
            this.physics.add.collider(player, healSprings, (p, s) => { p.setVelocityY(-900); SoundEngine.play('coin'); this.tweens.add({ targets: s, scaleY: 0.5, duration: 50, yoyo: true }); if(health < 5) { health++; healthText.setText('חיים: ' + health); explodeParticles(this, p.x, p.y, 0x0000FF, 20); } });

            // איסוף קרח
            this.physics.add.overlap(player, icePowerItem, (p, item) => { item.destroy(); hasIcePower = true; SoundEngine.play('coin'); explodeParticles(this, p.x, p.y, 0x00FFFF, 20); centerText.setText('כוח קרח! X לירות').setVisible(true).setFill('#00FFFF'); this.time.delayedCall(2000, () => { if(gameActive) centerText.setVisible(false); }); });
            
            this.physics.add.collider(iceballs, [ground, platforms], (ice) => { explodeParticles(this, ice.x, ice.y, 0x00FFFF, 5); ice.destroy(); });
            this.physics.add.collider(iceballs, enemies, (ice, enemy) => { ice.destroy(); explodeParticles(this, enemy.x, enemy.y, 0x00FFFF, 10); enemy.setVelocityX(0); enemy.setTint(0x00FFFF); enemy.body.enable = false; SoundEngine.play('hit'); this.time.delayedCall(1000, () => { explodeParticles(this, enemy.x, enemy.y, 0x800080, 15); enemy.destroy(); score += 30; scoreText.setText('ניקוד: ' + score); SoundEngine.play('jump'); }); });

            this.physics.add.collider(iceballs, boss, (ice, b) => {
                ice.destroy(); if (!b.getData('isAlive')) return; explodeParticles(this, b.x, b.y, 0x00FFFF, 20); SoundEngine.play('hit');
                b.setVelocityX(0); b.setVelocityY(0); b.body.allowGravity = false; b.setTint(0x00FFFF); b.setData('frozen', true); 
                bossHealth -= 1; bossHealthText.setText('בוס: ' + bossHealth + '/10');
                if (bossHealth <= 5 && !b.getData('enraged')) { b.setData('enraged', true); } 
                if (bossHealth <= 0) { killBoss(this, b); } else { this.time.delayedCall(1000, () => { if (!b.getData('isAlive')) return; b.body.allowGravity = true; b.setData('frozen', false); b.setTint(b.getData('enraged') ? 0x8B0000 : 0xFF0000); }); }
            });

            this.physics.add.collider(player, mysteryBlocks, (p, b) => {
                if (p.body.touching.up && b.body.touching.down && !b.getData('used')) {
                    b.setData('used', true); b.setTint(0x555555); SoundEngine.play('coin'); this.tweens.add({ targets: b, y: b.y - 10, duration: 50, yoyo: true }); 
                    let pwrTypes = [{t:'health', c:0xFF0000}, {t:'star', c:0xFFFF00}, {t:'speed', c:0x00FFFF}, {t:'poison', c:0x800080}];
                    let chosen = pwrTypes[Phaser.Math.Between(0, 3)];
                    let pwr = powerUps.create(b.x, b.y - 30, 'powerTex').setTint(chosen.c).setVelocityY(-200); pwr.setData('type', chosen.t);
                }
            });
            
            this.physics.add.overlap(player, powerUps, (p, pw) => { 
                let type = pw.getData('type'); explodeParticles(this, pw.x, pw.y, pw.tintTopLeft); pw.destroy(); SoundEngine.play('coin');
                if(type === 'poison') {
                    score = Math.max(0, score - 50); scoreText.setText('ניקוד: ' + score); reverseControls = true; player.setTint(0x800080);
                    centerText.setText('שליטה הפוכה!').setVisible(true).setFill('#800080'); this.time.delayedCall(5000, () => { reverseControls = false; player.clearTint(); if(gameActive) centerText.setVisible(false); });
                } else {
                    score += 50; scoreText.setText('ניקוד: ' + score);
                    if(type === 'health') { if(health < 5) health++; healthText.setText('חיים: ' + health); } 
                    else if(type === 'star') { isInvincible = true; player.setTint(0xFFFF00); this.time.delayedCall(5000, () => { isInvincible = false; player.clearTint(); }); } 
                    else if(type === 'speed') { currentSpeed = 450; player.setTint(0x00FFFF); this.time.delayedCall(5000, () => { currentSpeed = 250; player.clearTint(); }); }
                }
            });

            this.physics.add.overlap(player, coinsGroup, (p, c) => { c.destroy(); score += 10; scoreText.setText('ניקוד: ' + score); SoundEngine.play('coin'); });
            this.physics.add.collider(player, enemies, (p, e) => { if (p.body.touching.down && e.body.touching.up && p.body.velocity.y > 0) { explodeParticles(this, e.x, e.y, 0x800080); e.destroy(); p.setVelocityY(-350); score += 20; scoreText.setText('ניקוד: ' + score); SoundEngine.play('jump'); } else takeDamage(this); });
            
            this.physics.add.collider(player, boss, (p, b) => { if (!b.getData('isAlive')) return; if (p.body.touching.down && b.body.touching.up && p.body.velocity.y > 0) { p.setVelocityY(-400); bossHealth -= 4; SoundEngine.play('hit'); this.cameras.main.shake(150, 0.01); bossHealthText.setText('בוס: ' + Math.max(0, bossHealth) + '/10'); if (bossHealth <= 5 && !b.getData('enraged')) { b.setData('enraged', true); } b.setTint(0xFFFFFF); this.time.delayedCall(100, () => b.setTint(b.getData('enraged') ? 0x8B0000 : 0xFF0000)); if(bossHealth <= 0) killBoss(this, b); } else takeDamage(this); });

            cursors = this.input.keyboard.createCursorKeys(); keys = this.input.keyboard.addKeys('W,A,D,SPACE');
            restartKey = this.input.keyboard.addKey('R'); shootKey = this.input.keyboard.addKey('X'); dashKey = this.input.keyboard.addKey('Z'); coinRainKey = this.input.keyboard.addKey('C'); slowMoKey = this.input.keyboard.addKey('T');

            scoreText = this.add.text(16, 16, 'ניקוד: 0', { fontSize: '24px', fill: '#FFF', fontStyle: 'bold', stroke: '#000', strokeThickness: 3 }).setScrollFactor(0); healthText = this.add.text(16, 50, 'חיים: 3', { fontSize: '24px', fill: '#FFF', fontStyle: 'bold', stroke: '#000', strokeThickness: 3 }).setScrollFactor(0); bossHealthText = this.add.text(600, 16, '', { fontSize: '24px', fill: '#FF0000', fontStyle: 'bold', stroke: '#000', strokeThickness: 3 }).setScrollFactor(0); centerText = this.add.text(400, 300, 'רווח להתחלה | R לאיפוס', { fontSize: '36px', fill: '#FFF', fontStyle: 'bold', align:'center', stroke: '#000', strokeThickness: 4 }).setOrigin(0.5).setScrollFactor(0);

            this.input.keyboard.once('keydown-SPACE', () => { if (!gameActive) { gameActive = true; centerText.setVisible(false); SoundEngine.init(); startBossAI(this); startTrollEvents(this); } });
        }

        function update(time, delta) {
            if (Phaser.Input.Keyboard.JustDown(restartKey)) this.scene.restart();
            clouds.forEach(c => { c.x -= 0.2; if(c.x < -100) c.x = 3300; });
            if (!gameActive) return;
            
            // מראה את החיים של הבוס כשאתה קרוב אליו
            if (player.x > 2200 && boss.getData('isAlive')) bossHealthText.setText('בוס: ' + bossHealth + '/10'); else bossHealthText.setText('');

            let moveLeft = cursors.left.isDown || keys.A.isDown; let moveRight = cursors.right.isDown || keys.D.isDown;
            if (reverseControls) { let temp = moveLeft; moveLeft = moveRight; moveRight = temp; }
            if (moveLeft) { player.setVelocityX(-currentSpeed); player.flipX = true; } else if (moveRight) { player.setVelocityX(currentSpeed); player.flipX = false; } else { player.setVelocityX(0); }
            
            if (player.body.touching.down) { canDoubleJump = true; }
            if (Phaser.Input.Keyboard.JustDown(cursors.up) || Phaser.Input.Keyboard.JustDown(keys.W) || Phaser.Input.Keyboard.JustDown(cursors.space)) {
                if (player.body.touching.down) { player.setVelocityY(-600); SoundEngine.play('jump'); }
                else if (canDoubleJump) { player.setVelocityY(-500); SoundEngine.play('jump'); canDoubleJump = false; explodeParticles(this, player.x, player.y+15, 0xFFFFFF, 10); }
            }

            if (Phaser.Input.Keyboard.JustDown(dashKey) && canDash) { canDash = false; let dashDir = reverseControls ? !player.flipX : player.flipX; player.setVelocityX(dashDir ? -900 : 900); SoundEngine.play('shoot'); explodeParticles(this, player.x, player.y, 0xFFFFFF, 20); this.time.delayedCall(1000, () => canDash = true); }
            if (Phaser.Input.Keyboard.JustDown(slowMoKey)) { isSlowMo = !isSlowMo; this.physics.world.timeScale = isSlowMo ? 2.5 : 1; centerText.setText(isSlowMo ? 'הילוך איטי!' : '').setVisible(isSlowMo).setFill('#FFF'); }
            if (Phaser.Input.Keyboard.JustDown(coinRainKey) && !usedCoinRain) { usedCoinRain = true; SoundEngine.play('coin'); for(let i=0; i<20; i++) { let c = coinsGroup.create(player.x + Phaser.Math.Between(-200, 200), player.y - Phaser.Math.Between(300, 600), 'coinTex'); c.setBounce(0.5); c.setCollideWorldBounds(true); } }

            if (Math.abs(player.body.velocity.x) > 10 && Math.random() > 0.5) { let ghost = this.add.image(player.x, player.y, 'playerTex'); ghost.setTint(hasIcePower ? 0x00FFFF : 0x00FF00); ghost.setAlpha(0.4); this.tweens.add({ targets: ghost, alpha: 0, duration: 400, onComplete: () => ghost.destroy() }); }

            if (Phaser.Input.Keyboard.JustDown(shootKey) && hasIcePower && time > lastShotTime + 500) { lastShotTime = time; let ice = iceballs.create(player.x, player.y, 'iceTex'); ice.setVelocityX(player.flipX ? -500 : 500); SoundEngine.play('shoot'); explodeParticles(this, player.x, player.y, 0x00FFFF, 5); }

            if (player.y > 580) { takeDamage(this); player.x = Math.max(50, player.x - 300); player.y = 100; player.setVelocity(0); }
        }

        function takeDamage(scene) {
            if (isInvincible || !gameActive) return;
            health--; healthText.setText('חיים: ' + health); SoundEngine.play('hit'); scene.cameras.main.shake(150, 0.01); 
            isInvincible = true; player.setTint(0xFF0000); scene.time.delayedCall(200, () => player.clearTint()); scene.time.delayedCall(400, () => player.setTint(0xFF0000)); scene.time.delayedCall(1000, () => { isInvincible = false; player.clearTint(); });
            if (health <= 0) { gameActive = false; player.setTint(0xFF0000); centerText.setText('פסילה!\nלחץ R לאיפוס').setVisible(true).setFill('#FF0000'); }
        }

        function startBossAI(scene) {
            scene.time.addEvent({ delay: 1500, loop: true, callback: () => {
                if (boss.getData('isAlive') && !boss.getData('frozen') && gameActive && player.x > 2000) { let enraged = boss.getData('enraged'); boss.setVelocityY(enraged ? -700 : -600); boss.setVelocityX(player.x < boss.x ? (enraged ? -250 : -150) : (enraged ? 250 : 150)); }
            }});
            scene.time.addEvent({ delay: 2500, loop: true, callback: () => {
                if (boss.getData('isAlive') && !boss.getData('frozen') && gameActive && player.x > 2000) {
                    let enraged = boss.getData('enraged'); let shots = enraged ? 2 : 1; 
                    for(let i=0; i<shots; i++) {
                        scene.time.delayedCall(i * 300, () => {
                            if (!boss.getData('isAlive') || boss.getData('frozen')) return;
                            let fb = fireballs.create(boss.x, boss.y + 20, 'powerTex').setTint(0xFFA500); scene.physics.add.collider(fb, ground, (f) => { explodeParticles(scene, f.x, f.y, 0xFFA500, 5); f.destroy(); }); scene.physics.add.overlap(player, fb, (p, f) => { explodeParticles(scene, f.x, f.y, 0xFFA500, 5); f.destroy(); takeDamage(scene); }); scene.physics.moveToObject(fb, player, enraged ? 450 : 350); 
                        });
                    }
                }
            }});
        }

        function startTrollEvents(scene) {
            scene.time.addEvent({ delay: 12000, loop: true, callback: () => {
                if(!gameActive) return; enemies.getChildren().forEach(e => e.setAlpha(0.1));
                scene.time.delayedCall(3000, () => enemies.getChildren().forEach(e => e.setAlpha(1)));
            }});
            scene.time.addEvent({ delay: 15000, loop: true, callback: () => {
                if(!gameActive) return; centerText.setText('אזהרה: מטאורים!').setVisible(true).setFill('#FF0000'); SoundEngine.play('shoot');
                scene.time.delayedCall(1500, () => {
                    if(!gameActive) return; centerText.setVisible(false);
                    for(let i=0; i<6; i++) {
                        let fb = fireballs.create(player.x + Phaser.Math.Between(-400, 400), -50, 'powerTex').setTint(0xFF0000);
                        fb.body.allowGravity = true; fb.setVelocityY(Phaser.Math.Between(200, 400));
                        scene.physics.add.collider(fb, ground, (f) => { explodeParticles(scene, f.x, f.y, 0xFF0000, 10); f.destroy(); });
                        scene.physics.add.overlap(player, fb, (p, f) => { explodeParticles(scene, f.x, f.y, 0xFF0000, 10); f.destroy(); takeDamage(scene); });
                    }
                });
            }});
        }
    </script>
</body>
</html>
