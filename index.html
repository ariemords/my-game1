<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer Ultimate - THE FIX</title>
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: Arial, sans-serif; }
        #game-container { box-shadow: 0 0 30px rgba(0,0,0,0.8); border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        // --- מערכת סאונד ---
        const SoundEngine = {
            ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); },
            play(type) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination); const now = this.ctx.currentTime;
                if (type === 'jump') { osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(600, now + 0.1); gain.gain.setValueAtTime(0.04, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); } 
                else if (type === 'coin') { osc.type = 'sine'; osc.frequency.setValueAtTime(900, now); osc.frequency.setValueAtTime(1200, now + 0.05); gain.gain.setValueAtTime(0.04, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2); osc.start(); osc.stop(now + 0.2); } 
                else if (type === 'hit') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.linearRampToValueAtTime(20, now + 0.3); gain.gain.setValueAtTime(0.08, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); } 
                else if (type === 'shoot') { osc.type = 'triangle'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.1); gain.gain.setValueAtTime(0.08, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); }
            }
        };

        const config = { type: Phaser.AUTO, width: 800, height: 600, parent: 'game-container', physics: { default: 'arcade', arcade: { gravity: { y: 1000 }, debug: false } }, scene: { create: create, update: update } };
        const game = new Phaser.Game(config);
        
        let player, ground, platforms, iceGround, mysteryBlocks, powerUps, enemies, boss, fireballs, springs, healSprings, iceballs, coinsGroup, goals, lasers, lava, gravityBubbles, bubbleShield;
        let cursors, keys, restartKey, shootKey, dashKey, coinRainKey, slowMoKey;
        let score = 0, health = 3, bossHealth = 10, currentLevel = 1, gameActive = false, isInvincible = false, currentSpeed = 250, hasIcePower = true;
        let lastShotTime = 0, canDoubleJump = false, canDash = true, usedCoinRain = false, isSlowMo = false, reverseControls = false, gravityFlipped = false;
        let scoreText, healthText, bossHealthText, centerText, levelText, bossTalk;
        let clouds = [], skyColor;

        function createTextures(scene) {
            let g = scene.make.graphics({ x: 0, y: 0, add: false });
            // דמויות
            g.fillStyle(0x333333); g.fillRect(4, 0, 24, 8); g.fillStyle(0x333333); g.fillRect(0, 8, 32, 16); g.fillStyle(0x555555); g.fillRect(8, 12, 16, 8); g.fillStyle(0x00FF00); g.fillRect(12, 14, 2, 2); g.fillRect(18, 14, 2, 2); g.fillStyle(0x333333); g.fillRect(4, 24, 8, 8); g.fillRect(20, 24, 8, 8); g.generateTexture('playerTex', 32, 32); g.clear();
            g.fillStyle(0x800080, 0.8); g.fillCircle(16, 16, 14); g.fillStyle(0xFFFFFF); g.fillCircle(12, 14, 4); g.fillCircle(20, 14, 4); g.fillStyle(0x000000); g.fillCircle(12, 14, 2); g.fillCircle(20, 14, 2); g.generateTexture('enemyTex', 32, 32); g.clear();
            g.fillStyle(0x8B0000); g.fillRect(0, 0, 100, 100); g.fillStyle(0xFFFF00); g.fillRect(20, 30, 20, 20); g.fillRect(60, 30, 20, 20); g.generateTexture('bossTex', 100, 100); g.clear();
            // עולם
            g.fillStyle(0x8B4513); g.fillRect(0, 0, 400, 40); g.fillStyle(0x228B22); g.fillRect(0, 0, 400, 8); g.generateTexture('groundTex', 400, 40); g.clear();
            g.fillStyle(0xDEB887); g.fillRect(0, 0, 150, 20); g.generateTexture('platTex', 150, 20); g.clear();
            g.fillStyle(0xFFD700); g.fillRect(0, 0, 32, 64); g.fillStyle(0xFFFFFF); g.fillRect(0, 0, 32, 10); g.generateTexture('goalTex', 32, 64); g.clear();
            g.fillStyle(0xFFFF00); g.fillCircle(8, 8, 8); g.generateTexture('coinTex', 16, 16); g.clear();
            g.fillStyle(0x00FFFF); g.fillCircle(8, 8, 8); g.generateTexture('iceTex', 16, 16); g.clear();
            g.fillStyle(0xFFFFFF, 0.5); g.fillCircle(16, 16, 16); g.generateTexture('bubbleTex', 32, 32); g.clear();
            g.fillStyle(0xFF4500); g.fillRect(0, 0, 800, 40); g.generateTexture('lavaTex', 800, 40); g.clear();
            g.fillStyle(0xFF0000); g.fillRect(0, 0, 10, 600); g.generateTexture('laserTex', 10, 600); g.clear();
            g.fillStyle(0x32CD32); g.fillRect(0, 0, 32, 16); g.generateTexture('springTex', 32, 16); g.clear();
            g.fillStyle(0x0000FF); g.fillRect(0, 0, 32, 16); g.generateTexture('healSpringTex', 32, 16); g.clear();
            g.fillStyle(0xFF8C00); g.fillRect(0, 0, 40, 40); g.generateTexture('blockTex', 40, 40); g.clear();
            g.fillStyle(0xFFFFFF); g.fillCircle(4, 4, 4); g.generateTexture('particleTex', 8, 8); g.clear();
        }

        function create() {
            createTextures(this);
            
            // יצירת ממשק בסיסי
            scoreText = this.add.text(16, 16, 'ניקוד: 0', { fontSize: '24px', fill: '#FFF', fontStyle: 'bold', stroke: '#000', strokeThickness: 3 }).setScrollFactor(0).setDepth(20);
            healthText = this.add.text(16, 50, 'חיים: 3', { fontSize: '24px', fill: '#FFF', fontStyle: 'bold', stroke: '#000', strokeThickness: 3 }).setScrollFactor(0).setDepth(20);
            levelText = this.add.text(400, 16, 'שלב: 1', { fontSize: '24px', fill: '#FFF', fontStyle: 'bold', stroke: '#000', strokeThickness: 3 }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(20);
            bossHealthText = this.add.text(600, 16, '', { fontSize: '24px', fill: '#FF0000', fontStyle: 'bold', stroke: '#000', strokeThickness: 3 }).setScrollFactor(0).setDepth(20);
            centerText = this.add.text(400, 300, 'רווח להתחלה | R לאיפוס מלא\nקרח (X) פעיל מההתחלה!', { fontSize: '32px', fill: '#FFF', fontStyle: 'bold', align:'center', stroke: '#000', strokeThickness: 4 }).setOrigin(0.5).setScrollFactor(0).setDepth(20);
            bossTalk = this.add.text(0, 0, '', { fontSize: '18px', fill: '#000', backgroundColor: '#FFF', padding: 5 }).setOrigin(0.5).setVisible(false).setDepth(25);

            setupLevel(this, 1);

            cursors = this.input.keyboard.createCursorKeys(); keys = this.input.keyboard.addKeys('W,A,D,SPACE,X,Z,C,T,R');
            
            this.input.keyboard.on('keydown-SPACE', () => { if (!gameActive && centerText.visible) { gameActive = true; centerText.setVisible(false); SoundEngine.init(); if(currentLevel === 3) startBossAI(this); } });
            this.input.keyboard.on('keydown-R', () => { window.location.reload(); }); // תיקון R - ריענון דף
        }

        function setupLevel(scene, level) {
            currentLevel = level; scene.physics.world.timeScale = 1; reverseControls = false; gravityFlipped = false;
            if(player) { player.x = 100; player.y = 450; player.setVelocity(0); player.clearTint(); }
            if(levelText) levelText.setText('שלב: ' + level);

            // ניקוי קבוצות ישנות
            if(ground) [ground, platforms, mysteryBlocks, enemies, goals, springs, healSprings, lasers, lava, fireballs, iceballs, coinsGroup].forEach(g => g.clear(true, true));

            ground = scene.physics.add.staticGroup(); platforms = scene.physics.add.staticGroup(); mysteryBlocks = scene.physics.add.staticGroup(); 
            enemies = scene.physics.add.group(); goals = scene.physics.add.staticGroup(); springs = scene.physics.add.staticGroup(); healSprings = scene.physics.add.staticGroup();
            lasers = scene.physics.add.staticGroup(); lava = scene.physics.add.staticGroup(); fireballs = scene.physics.add.group({allowGravity:false}); 
            iceballs = scene.physics.add.group({allowGravity:false}); coinsGroup = scene.physics.add.group();

            scene.physics.world.setBounds(0, 0, 3200, 600); scene.cameras.main.setBounds(0, 0, 3200, 600);

            // בניית עולם לפי שלב
            if(level === 1) scene.cameras.main.setBackgroundColor('#4CA1AF');
            else if(level === 2) scene.cameras.main.setBackgroundColor('#483D8B');
            else scene.cameras.main.setBackgroundColor('#8B0000');

            for (let x = 0; x < 3200; x += 400) ground.create(x + 200, 580, 'groundTex');
            if(level === 3) { for (let x = 800; x < 2800; x += 800) lava.create(x, 590, 'lavaTex'); }

            // פלטפורמות
            [[500,400], [900,300], [1400,400], [2000,300]].forEach(p => {
                let plat = platforms.create(p[0], p[1], 'platTex');
                plat.body.checkCollision.down = false;
                if(level === 2 && Math.random() > 0.5) { // פלטפורמות נעמדות
                    plat.setAngle(90); plat.body.setSize(20, 150);
                }
            });

            // דגל סיום - תיקון מעבר שלב
            goals.create(3100, 520, 'goalTex');

            // אויבים
            [700, 1200, 1800, 2400].forEach(x => enemies.create(x, 500, 'enemyTex').setVelocityX(100).setBounceX(1).setCollideWorldBounds(true));

            mysteryBlocks.create(400, 250, 'blockTex').setData('used', false);
            springs.create(1600, 550, 'springTex');
            if(level > 1) healSprings.create(2500, 550, 'healSpringTex');

            if(!player) {
                player = scene.physics.add.sprite(100, 450, 'playerTex').setBounce(0.1).setCollideWorldBounds(true);
                scene.cameras.main.startFollow(player, true, 0.05, 0.05);
                bubbleShield = scene.add.image(0, 0, 'bubbleTex').setAlpha(0).setDepth(21);
            }

            if(level === 3) {
                boss = scene.physics.add.sprite(2900, 400, 'bossTex').setBounce(0.2).setCollideWorldBounds(true).setData('isAlive', true).setData('hp', 10);
                scene.physics.add.collider(boss, ground);
            }

            // התנגשויות
            scene.physics.add.collider(player, [ground, platforms]);
            scene.physics.add.collider(enemies, [ground, platforms]);
            scene.physics.add.collider(player, goals, () => { if(currentLevel < 3) setupLevel(scene, currentLevel + 1); else winGame(scene); });
            scene.physics.add.collider(player, springs, (p, s) => { p.setVelocityY(-1100); SoundEngine.play('coin'); });
            scene.physics.add.collider(player, healSprings, (p, s) => { p.setVelocityY(-900); if(health < 5) health++; healthText.setText('חיים: ' + health); SoundEngine.play('coin'); });
            scene.physics.add.collider(player, mysteryBlocks, (p, b) => {
                if(p.body.touching.up && b.body.touching.down && !b.getData('used')) {
                    b.setData('used', true); b.setTint(0x555555); SoundEngine.play('coin');
                    let pwr = powerUps.create(b.x, b.y-40, 'coinTex').setTint(0xFF0000).setVelocityY(-200);
                }
            });
            scene.physics.add.collider(player, enemies, (p, e) => { if(p.body.touching.down && e.body.touching.up) { e.destroy(); p.setVelocityY(-350); score+=20; } else takeDamage(scene); });
            if(level === 3) {
                scene.physics.add.collider(player, boss, (p, b) => { if(p.body.touching.down && b.body.touching.up) { p.setVelocityY(-400); hitBoss(scene, 4); } else takeDamage(scene); });
            }

            if(level === 1 && !trollEventsStarted) { trollEventsStarted = true; startTrollEvents(scene); }
        }

        let trollEventsStarted = false;
        function update(time) {
            if(!gameActive) return;
            
            // תנועה
            let v = currentSpeed;
            if(reverseControls) {
                if(cursors.left.isDown || keys.A.isDown) player.setVelocityX(v);
                else if(cursors.right.isDown || keys.D.isDown) player.setVelocityX(-v);
                else player.setVelocityX(0);
            } else {
                if(cursors.left.isDown || keys.A.isDown) player.setVelocityX(-v);
                else if(cursors.right.isDown || keys.D.isDown) player.setVelocityX(v);
                else player.setVelocityX(0);
            }

            if((Phaser.Input.Keyboard.JustDown(cursors.up) || Phaser.Input.Keyboard.JustDown(keys.W) || Phaser.Input.Keyboard.JustDown(cursors.space))) {
                if(player.body.touching.down) { player.setVelocityY(-600); canDoubleJump = true; SoundEngine.play('jump'); }
                else if(canDoubleJump) { player.setVelocityY(-500); canDoubleJump = false; SoundEngine.play('jump'); }
            }

            // ירי (X) - עובד מההתחלה
            if(Phaser.Input.Keyboard.JustDown(keys.X) && time > lastShotTime + 500) {
                lastShotTime = time; SoundEngine.play('shoot');
                let ice = iceballs.create(player.x, player.y, 'iceTex');
                ice.setVelocityX(player.flipX ? -500 : 500);
                this.physics.add.collider(ice, enemies, (i, e) => { e.destroy(); i.destroy(); score+=30; });
                if(currentLevel === 3) this.physics.add.collider(ice, boss, (i, b) => { i.destroy(); hitBoss(this, 1); });
            }

            // דאש (Z)
            if(Phaser.Input.Keyboard.JustDown(keys.Z) && canDash) {
                canDash = false; player.setVelocityX(player.flipX ? -1000 : 1000);
                this.time.delayedCall(1000, () => canDash = true);
            }

            // מגן בועה אוטומטי
            if(time % 30000 < 50) { bubbleShield.setAlpha(1); isInvincible = true; this.time.delayedCall(1000, () => { bubbleShield.setAlpha(0); isInvincible = false; }); }
            bubbleShield.x = player.x; bubbleShield.y = player.y;

            // עדכון בוס
            if(currentLevel === 3 && boss && boss.getData('isAlive')) {
                bossTalk.setPosition(boss.x, boss.y - 80);
                if(player.x > 2200) bossHealthText.setText('בוס: ' + boss.getData('hp') + '/10');
            }

            if(player.y > 600) { takeDamage(this); player.x = 100; player.y = 100; }
        }

        function hitBoss(scene, damage) {
            let hp = boss.getData('hp') - damage;
            boss.setData('hp', hp); boss.setTint(0xFFFFFF); scene.time.delayedCall(100, () => boss.clearTint());
            if(hp <= 0) killBoss(scene, boss);
            if(hp <= 5) boss.setData('enraged', true);
            if(hp <= 2) boss.setTint(0x000000); // הפתעה: מצב טירוף
        }

        function takeDamage(scene) {
            if(isInvincible) return;
            health--; healthText.setText('חיים: ' + health); SoundEngine.play('hit');
            isInvincible = true; player.setTint(0xFF0000);
            scene.time.delayedCall(1000, () => { isInvincible = false; player.clearTint(); });
            if(health <= 0) { gameActive = false; centerText.setText('פסילה!\nלחץ R לאיפוס').setVisible(true); }
        }

        function startBossAI(scene) {
            scene.time.addEvent({ delay: 2000, loop: true, callback: () => {
                if(!gameActive || !boss.getData('isAlive')) return;
                boss.setVelocityY(-600); boss.setVelocityX(player.x < boss.x ? -200 : 200);
                bossTalk.setText(['חצוף!', 'צא מפה!', 'אני אנצח!'][Math.floor(Math.random()*3)]).setVisible(true);
                scene.time.delayedCall(1000, () => bossTalk.setVisible(false));
            }});
            scene.time.addEvent({ delay: 3000, loop: true, callback: () => {
                if(!gameActive || !boss.getData('isAlive')) return;
                let fb = fireballs.create(boss.x, boss.y, 'coinTex').setTint(0xFFA500);
                scene.physics.moveToObject(fb, player, 300);
            }});
        }

        function startTrollEvents(scene) {
            scene.time.addEvent({ delay: 15000, loop: true, callback: () => {
                if(!gameActive) return;
                for(let i=0; i<5; i++) {
                    let m = fireballs.create(player.x + Phaser.Math.Between(-200, 200), -50, 'coinTex').setTint(0xFF0000);
                    m.body.allowGravity = true;
                }
            }});
        }

        function killBoss(scene, b) { b.destroy(); gameActive = false; centerText.setText('ניצחון קולנועי!').setVisible(true).setFill('#00FF00'); scene.cameras.main.zoomTo(2, 2000); }
        function winGame(scene) { gameActive = false; centerText.setText('ניצחת את כל השלבים!').setVisible(true); }
    </script>
</body>
</html>
