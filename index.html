<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer Ultimate - Flawless Edition</title>
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: Arial, sans-serif; }
        #game-container { box-shadow: 0 0 30px rgba(0,0,0,0.8); border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        // --- מערכת סאונד ---
        const SoundEngine = {
            ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); },
            play(type) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination); const now = this.ctx.currentTime;
                if (type === 'jump') { osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(600, now + 0.1); gain.gain.setValueAtTime(0.04, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); } 
                else if (type === 'coin') { osc.type = 'sine'; osc.frequency.setValueAtTime(900, now); osc.frequency.setValueAtTime(1200, now + 0.05); gain.gain.setValueAtTime(0.04, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2); osc.start(); osc.stop(now + 0.2); } 
                else if (type === 'hit') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.linearRampToValueAtTime(20, now + 0.3); gain.gain.setValueAtTime(0.08, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); } 
                else if (type === 'shoot') { osc.type = 'triangle'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.1); gain.gain.setValueAtTime(0.08, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); }
            }
        };

        // --- טקסטורות ---
        function createTextures(scene) {
            if(scene.textures.exists('playerTex')) return; // יצירה פעם אחת בלבד
            let g = scene.make.graphics({ x: 0, y: 0, add: false });
            g.fillStyle(0x333333); g.fillRect(4, 0, 24, 8); g.fillStyle(0x333333); g.fillRect(0, 8, 32, 16); g.fillStyle(0x555555); g.fillRect(8, 12, 16, 8); g.fillStyle(0x00FF00); g.fillRect(12, 14, 2, 2); g.fillRect(18, 14, 2, 2); g.fillStyle(0x333333); g.fillRect(4, 24, 8, 8); g.fillRect(20, 24, 8, 8); g.generateTexture('playerTex', 32, 32); g.clear();
            g.fillStyle(0x333333); g.fillRect(4, 2, 24, 8); g.fillStyle(0x333333); g.fillRect(0, 10, 32, 16); g.fillStyle(0x555555); g.fillRect(8, 14, 16, 8); g.fillStyle(0x00FF00); g.fillRect(12, 16, 2, 2); g.fillRect(18, 16, 2, 2); g.fillStyle(0x333333); g.fillRect(8, 26, 8, 6); g.fillRect(16, 24, 8, 8); g.generateTexture('playerWalkTex', 32, 32); g.clear();
            g.fillStyle(0x800080, 0.8); g.fillCircle(16, 16, 14); g.fillStyle(0xFFFFFF); g.fillCircle(12, 14, 4); g.fillCircle(20, 14, 4); g.fillStyle(0x000000); g.fillCircle(12, 14, 2); g.fillCircle(20, 14, 2); g.generateTexture('enemyTex', 32, 32); g.clear();
            g.fillStyle(0x8B0000); g.fillRect(0, 0, 100, 100); g.fillStyle(0xFFFF00); g.fillRect(20, 30, 20, 20); g.fillRect(60, 30, 20, 20); g.generateTexture('bossTex', 100, 100); g.clear();
            g.fillStyle(0x8B4513); g.fillRect(0, 0, 400, 40); g.fillStyle(0x228B22); g.fillRect(0, 0, 400, 8); g.generateTexture('groundTex', 400, 40); g.clear();
            g.fillStyle(0x00FFFF, 0.6); g.fillRect(0, 0, 400, 40); g.generateTexture('iceGroundTex', 400, 40); g.clear();
            g.fillStyle(0xDEB887); g.fillRect(0, 0, 150, 20); g.generateTexture('platTex', 150, 20); g.clear();
            g.fillStyle(0xFFD700); g.fillRect(0, 0, 32, 64); g.fillStyle(0xFFFFFF); g.fillRect(0, 0, 32, 10); g.generateTexture('goalTex', 32, 64); g.clear();
            g.fillStyle(0xFFFF00); g.fillCircle(8, 8, 8); g.generateTexture('coinTex', 16, 16); g.clear();
            g.fillStyle(0x00FFFF); g.fillCircle(8, 8, 8); g.generateTexture('iceTex', 16, 16); g.clear();
            g.fillStyle(0xFFFFFF, 0.5); g.fillCircle(16, 16, 16); g.generateTexture('bubbleTex', 32, 32); g.clear();
            g.fillStyle(0xFF4500); g.fillRect(0, 0, 800, 40); g.generateTexture('lavaTex', 800, 40); g.clear();
            g.fillStyle(0xFF0000); g.fillRect(0, 0, 10, 600); g.generateTexture('laserTex', 10, 600); g.clear();
            g.fillStyle(0x32CD32); g.fillRect(0, 0, 32, 16); g.generateTexture('springTex', 32, 16); g.clear();
            g.fillStyle(0x0000FF); g.fillRect(0, 0, 32, 16); g.generateTexture('healSpringTex', 32, 16); g.clear();
            g.fillStyle(0xFF8C00); g.fillRect(0, 0, 40, 40); g.generateTexture('blockTex', 40, 40); g.clear();
            g.fillStyle(0xFFFFFF); g.fillRect(0, 0, 20, 20); g.generateTexture('powerTex', 20, 20); g.clear();
            g.fillStyle(0xFFFFFF); g.fillCircle(4, 4, 4); g.generateTexture('particleTex', 8, 8); g.clear();
            g.fillStyle(0xFFFFFF, 0.5); g.fillCircle(50, 20, 20); g.fillCircle(30, 30, 20); g.fillCircle(70, 30, 20); g.generateTexture('cloudTex', 100, 50); g.clear();
            g.fillStyle(0x0000FF); g.fillRect(0, 0, 40, 60); g.generateTexture('portalTex', 40, 60); g.clear();
        }

        // --- קונפיגורציית סצנה מסודרת ונקייה ---
        const sceneConfig = {
            init: function(data) {
                // המידע נשמר בעת מעבר שלב!
                this.currentLevel = data.level || 1;
                this.score = data.score || 0;
                this.health = data.health !== undefined ? data.health : 3;
                this.bossHealth = 10;
                this.gameActive = false;
                this.isInvincible = false;
                this.currentSpeed = 250;
                this.hasIcePower = true; // הפתעה: קרח תמיד פעיל!
                this.canDoubleJump = false;
                this.canDash = true;
                this.usedCoinRain = false;
                this.isSlowMo = false;
                this.reverseControls = false;
                this.gravityFlipped = false;
                this.lastShotTime = 0;
            },
            create: function() {
                createTextures(this);
                this.physics.world.timeScale = 1;
                
                // מערכת ממשק (UI) - טקסטים לא דורסים אחד את השני
                this.scoreText = this.add.text(16, 16, 'ניקוד: ' + this.score, { fontSize: '24px', fill: '#FFF', fontStyle: 'bold', stroke: '#000', strokeThickness: 3 }).setScrollFactor(0).setDepth(20);
                this.healthText = this.add.text(16, 50, 'חיים: ' + this.health, { fontSize: '24px', fill: '#FFF', fontStyle: 'bold', stroke: '#000', strokeThickness: 3 }).setScrollFactor(0).setDepth(20);
                this.levelText = this.add.text(400, 16, 'שלב: ' + this.currentLevel, { fontSize: '24px', fill: '#FFF', fontStyle: 'bold', stroke: '#000', strokeThickness: 3 }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(20);
                this.bossHealthText = this.add.text(600, 16, '', { fontSize: '24px', fill: '#FF0000', fontStyle: 'bold', stroke: '#000', strokeThickness: 3 }).setScrollFactor(0).setDepth(20);
                
                // טקסט מרכזי מסודר
                let startMsg = this.currentLevel === 1 ? 'רווח - התחל | R - איפוס\nקרח (X) פעיל מההתחלה!' : (this.currentLevel === 2 ? 'שלב 2 - אזהרת קרח ולייזרים' : 'שלב סופי - קרב הבוס הגדול!');
                this.centerText = this.add.text(400, 300, startMsg, { fontSize: '32px', fill: '#FFF', fontStyle: 'bold', align:'center', stroke: '#000', strokeThickness: 4 }).setOrigin(0.5).setScrollFactor(0).setDepth(20);
                this.bossTalk = this.add.text(0, 0, '', { fontSize: '18px', fill: '#000', backgroundColor: '#FFF', padding: 5 }).setOrigin(0.5).setVisible(false).setDepth(25);

                this.physics.world.setBounds(0, 0, 3200, 600); this.cameras.main.setBounds(0, 0, 3200, 600);

                // רקעים
                if(this.currentLevel === 1) this.cameras.main.setBackgroundColor('#4CA1AF');
                else if(this.currentLevel === 2) this.cameras.main.setBackgroundColor('#483D8B');
                else this.cameras.main.setBackgroundColor('#8B0000');

                // עננים
                this.clouds = [];
                for(let i=0; i<15; i++) { let cloud = this.add.image(Phaser.Math.Between(0, 3200), Phaser.Math.Between(50, 250), 'cloudTex'); cloud.setScrollFactor(Phaser.Math.FloatBetween(0.1, 0.4)); this.clouds.push(cloud); }

                // בניית קבוצות
                this.ground = this.physics.add.staticGroup(); this.platforms = this.physics.add.staticGroup(); this.iceGround = this.physics.add.staticGroup(); 
                this.mysteryBlocks = this.physics.add.staticGroup(); this.goals = this.physics.add.staticGroup(); this.springs = this.physics.add.staticGroup(); 
                this.healSprings = this.physics.add.staticGroup(); this.lasers = this.physics.add.staticGroup(); this.lava = this.physics.add.staticGroup(); 
                this.enemies = this.physics.add.group(); this.fireballs = this.physics.add.group({allowGravity:false}); this.iceballs = this.physics.add.group({allowGravity:false}); 
                this.coinsGroup = this.physics.add.group(); this.powerUps = this.physics.add.group(); this.gravityBubbles = this.physics.add.group({allowGravity:false});

                // רצפה ולבה
                if(this.currentLevel < 3) {
                    for (let x = 0; x < 3200; x += 400) {
                        if(this.currentLevel === 2 && (x===1200 || x===2000)) this.iceGround.create(x + 200, 580, 'iceGroundTex');
                        else this.ground.create(x + 200, 580, 'groundTex');
                    }
                } else {
                    for (let x = 0; x < 800; x += 400) this.ground.create(x + 200, 580, 'groundTex');
                    for (let x = 800; x < 3200; x += 800) this.lava.create(x, 590, 'lavaTex');
                }

                // פלטפורמות
                let platPositions = (this.currentLevel === 1) ? [500, 900, 1400, 2000] : [600, 1100, 1600, 2200];
                platPositions.forEach((x, i) => {
                    let plat = this.platforms.create(x, 450 - (i*20), 'platTex');
                    plat.body.checkCollision.down = false; plat.body.checkCollision.left = false; plat.body.checkCollision.right = false;
                    if(this.currentLevel === 2 && Math.random() > 0.5) { plat.setAngle(90); plat.body.setSize(20, 150); } // פלטפורמה עומדת
                });

                // דגל סיום
                if(this.currentLevel < 3) this.goals.create(3100, 520, 'goalTex');

                // פורטל סודי שלב 1
                if(this.currentLevel === 1) {
                    this.portal = this.physics.add.sprite(250, 530, 'portalTex'); this.portal.body.allowGravity = false;
                }

                // אויבים ומקפצות
                [700, 1200, 1800, 2400].forEach(x => this.enemies.create(x, 500, 'enemyTex').setVelocityX(100).setBounceX(1).setCollideWorldBounds(true));
                this.springs.create(1600, 550, 'springTex');
                if(this.currentLevel > 1) this.healSprings.create(2500, 550, 'healSpringTex');

                // תפוח זהב (הפתעה חדשה)
                this.giantApple = this.physics.add.sprite(1800, 50, 'coinTex').setScale(3); this.giantApple.body.allowGravity = false;

                // קוביות מריו
                this.mysteryBlocks.create(400, 250, 'blockTex').setData('used', false);
                this.mysteryBlocks.create(1000, 250, 'blockTex').setData('used', false);
                this.mysteryBlocks.create(1500, 250, 'blockTex').setData('used', false);

                // שחקן ומגן בועה
                this.player = this.physics.add.sprite(100, 450, 'playerTex').setBounce(0.1).setCollideWorldBounds(true);
                this.cameras.main.startFollow(this.player, true, 0.05, 0.05);
                this.bubbleShield = this.add.image(0, 0, 'bubbleTex').setAlpha(0).setDepth(21);
                
                // בוס סופי
                if(this.currentLevel === 3) {
                    this.boss = this.physics.add.sprite(2900, 400, 'bossTex').setBounce(0.2).setCollideWorldBounds(true).setData('isAlive', true).setData('hp', 10);
                    this.physics.add.collider(this.boss, this.ground);
                }

                // --- התנגשויות ---
                this.physics.add.collider(this.player, [this.ground, this.platforms, this.iceGround]);
                this.physics.add.collider(this.enemies, [this.ground, this.platforms, this.iceGround]);
                this.physics.add.collider(this.powerUps, [this.ground, this.platforms, this.iceGround]);
                this.physics.add.collider(this.coinsGroup, [this.ground, this.platforms, this.iceGround]);
                
                // החלקה על קרח
                this.physics.add.collider(this.player, this.iceGround, () => { if (Math.abs(this.player.body.velocity.x) > 10) this.player.setAccelerationX(this.player.body.velocity.x * 2); else this.player.setAccelerationX(0); });
                
                // מעבר שלב - הלוגיקה החזקה!
                this.physics.add.overlap(this.player, this.goals, () => { 
                    if(this.gameActive && this.currentLevel < 3) {
                        this.gameActive = false; SoundEngine.play('level');
                        this.scene.restart({ level: this.currentLevel + 1, score: this.score, health: this.health });
                    }
                });

                // הפתעות ובונוסים
                if(this.portal) this.physics.add.overlap(this.player, this.portal, (p, pt) => { pt.destroy(); p.x = 2800; p.y = 100; SoundEngine.play('shoot'); });
                this.physics.add.overlap(this.player, this.giantApple, (p, a) => { a.destroy(); this.score += 100; this.scoreText.setText('ניקוד: ' + this.score); SoundEngine.play('coin'); this.explodeParticles(p.x, p.y, 0xFFD700, 30); });

                this.physics.add.collider(this.player, this.springs, (p, s) => { p.setVelocityY(-1100); SoundEngine.play('coin'); });
                this.physics.add.collider(this.player, this.healSprings, (p, s) => { p.setVelocityY(-900); if(this.health < 5) this.health++; this.healthText.setText('חיים: ' + this.health); SoundEngine.play('coin'); });
                
                this.physics.add.collider(this.player, this.mysteryBlocks, (p, b) => {
                    if(p.body.touching.up && b.body.touching.down && !b.getData('used')) {
                        b.setData('used', true); b.setTint(0x555555); SoundEngine.play('coin'); this.tweens.add({ targets: b, y: b.y - 10, duration: 50, yoyo: true });
                        // הוספתי כוח כיווץ ירוק!
                        let pwrTypes = [{t:'health', c:0xFF0000}, {t:'star', c:0xFFFF00}, {t:'speed', c:0x00FFFF}, {t:'poison', c:0x800080}, {t:'shrink', c:0x00FF00}];
                        let chosen = pwrTypes[Phaser.Math.Between(0, 4)];
                        let pwr = this.powerUps.create(b.x, b.y - 30, 'powerTex').setTint(chosen.c).setVelocityY(-200); pwr.setData('type', chosen.t);
                    }
                });

                this.physics.add.overlap(this.player, this.powerUps, (p, pw) => {
                    let type = pw.getData('type'); this.explodeParticles(pw.x, pw.y, pw.tintTopLeft); pw.destroy(); SoundEngine.play('coin');
                    if(type === 'poison') {
                        this.score = Math.max(0, this.score - 50); this.scoreText.setText('ניקוד: ' + this.score); this.reverseControls = true; p.setTint(0x800080);
                        this.centerText.setText('שליטה הפוכה!').setVisible(true).setFill('#800080');
                        this.time.delayedCall(5000, () => { this.reverseControls = false; p.clearTint(); if(this.gameActive) this.centerText.setVisible(false); });
                    } else if (type === 'shrink') {
                        p.setScale(0.5); this.currentSpeed = 450; this.centerText.setText('כיווץ מהיר!').setVisible(true).setFill('#00FF00');
                        this.time.delayedCall(5000, () => { p.setScale(1); this.currentSpeed = 250; if(this.gameActive) this.centerText.setVisible(false); });
                    } else {
                        this.score += 50; this.scoreText.setText('ניקוד: ' + this.score);
                        if(type === 'health') { if(this.health < 5) this.health++; this.healthText.setText('חיים: ' + this.health); }
                        else if(type === 'star') { this.isInvincible = true; p.setTint(0xFFFF00); this.time.delayedCall(5000, () => { this.isInvincible = false; p.clearTint(); }); }
                        else if(type === 'speed') { this.currentSpeed = 450; p.setTint(0x00FFFF); this.time.delayedCall(5000, () => { this.currentSpeed = 250; p.clearTint(); }); }
                    }
                });

                this.physics.add.overlap(this.player, this.coinsGroup, (p, c) => { c.destroy(); this.score += 10; this.scoreText.setText('ניקוד: ' + this.score); SoundEngine.play('coin'); });

                this.physics.add.collider(this.player, this.enemies, (p, e) => { 
                    // Shield Bash! מכת מגן דורסת אויבים
                    if(this.isInvincible && this.bubbleShield.alpha > 0 && !this.canDash) { e.destroy(); this.score+=20; this.explodeParticles(e.x, e.y, 0x800080); }
                    else if(p.body.touching.down && e.body.touching.up) { e.destroy(); p.setVelocityY(-350); this.score+=20; } 
                    else this.takeDamage(); 
                });
                
                if(this.currentLevel === 3) {
                    this.physics.add.overlap(this.player, this.lava, () => { this.health = 0; this.takeDamage(); });
                    this.physics.add.collider(this.player, this.boss, (p, b) => { if(p.body.touching.down && b.body.touching.up) { p.setVelocityY(-400); this.hitBoss(4); } else this.takeDamage(); });
                    this.physics.add.overlap(this.player, this.fireballs, (p, f) => { f.destroy(); this.takeDamage(); });
                }

                // אנימציית שחקן
                this.time.addEvent({ delay: 200, loop: true, callback: () => {
                    if (this.gameActive && this.player.body) {
                        if (Math.abs(this.player.body.velocity.x) > 10 && this.player.body.touching.down) this.player.setTexture(this.player.texture.key === 'playerTex' ? 'playerWalkTex' : 'playerTex');
                        else this.player.setTexture('playerTex');
                    }
                }});

                // הגדרת מקשים
                this.cursors = this.input.keyboard.createCursorKeys(); this.keys = this.input.keyboard.addKeys('W,A,D,SPACE,X,Z,C,T,R');
                
                this.input.keyboard.on('keydown-SPACE', () => { 
                    if (!this.gameActive && this.centerText.visible && this.health > 0) { 
                        this.gameActive = true; this.centerText.setVisible(false); SoundEngine.init(); 
                        if(this.currentLevel === 3) this.startBossAI(); 
                        if(this.currentLevel === 1) this.startTrollEvents();
                    } 
                });
                
                // כפתור ה-R מרענן את כל הדף לאיפוס מוחלט!
                this.input.keyboard.on('keydown-R', () => { window.location.reload(); });
            },

            update: function(time, delta) {
                if (!this.gameActive) return;
                
                this.clouds.forEach(c => { c.x -= 0.2; if(c.x < -100) c.x = 3300; });
                
                let v = this.currentSpeed;
                if(this.reverseControls) {
                    if(this.cursors.left.isDown || this.keys.A.isDown) { this.player.setVelocityX(v); this.player.flipX = false; }
                    else if(this.cursors.right.isDown || this.keys.D.isDown) { this.player.setVelocityX(-v); this.player.flipX = true; }
                    else this.player.setVelocityX(0);
                } else {
                    if(this.cursors.left.isDown || this.keys.A.isDown) { this.player.setVelocityX(-v); this.player.flipX = true; }
                    else if(this.cursors.right.isDown || this.keys.D.isDown) { this.player.setVelocityX(v); this.player.flipX = false; }
                    else this.player.setVelocityX(0);
                }

                if (!this.player.body.touching.down || !this.player.body.blocked.down) { this.player.setAccelerationX(0); }

                // Wall Jump (קפיצת קירות)
                let touchingWall = this.player.body.blocked.left || this.player.body.blocked.right;
                if (touchingWall && !this.player.body.touching.down) {
                    this.player.setVelocityY(50); // החלקה מטה
                    if (Phaser.Input.Keyboard.JustDown(this.cursors.up) || Phaser.Input.Keyboard.JustDown(this.keys.W)) {
                        this.player.setVelocityY(-500); this.player.setVelocityX(this.player.body.blocked.left ? 400 : -400); SoundEngine.play('jump');
                    }
                }

                // קפיצה כפולה
                if(this.player.body.touching.down) { this.canDoubleJump = true; }
                if((Phaser.Input.Keyboard.JustDown(this.cursors.up) || Phaser.Input.Keyboard.JustDown(this.keys.W) || Phaser.Input.Keyboard.JustDown(this.cursors.space)) && !touchingWall) {
                    if(this.player.body.touching.down) { this.player.setVelocityY(-600); this.canDoubleJump = true; SoundEngine.play('jump'); }
                    else if(this.canDoubleJump) { this.player.setVelocityY(-500); this.canDoubleJump = false; SoundEngine.play('jump'); this.explodeParticles(this.player.x, this.player.y+15, 0xFFFFFF, 10); }
                }

                // שובל רפאים!
                if (Math.abs(this.player.body.velocity.x) > 10 && Math.random() > 0.5) {
                    let ghost = this.add.image(this.player.x, this.player.y, this.player.texture.key);
                    ghost.setTint(0x00FFFF); ghost.setAlpha(0.4); ghost.flipX = this.player.flipX; ghost.setScale(this.player.scaleX);
                    this.tweens.add({ targets: ghost, alpha: 0, duration: 400, onComplete: () => ghost.destroy() });
                }

                // ירי קרח
                if(Phaser.Input.Keyboard.JustDown(this.keys.X) && time > this.lastShotTime + 500) {
                    this.lastShotTime = time; SoundEngine.play('shoot');
                    let ice = this.iceballs.create(this.player.x, this.player.y, 'iceTex'); ice.setVelocityX(this.player.flipX ? -500 : 500);
                    this.physics.add.collider(ice, [this.ground, this.platforms, this.iceGround], (i) => i.destroy());
                    this.physics.add.collider(ice, this.enemies, (i, e) => { e.destroy(); i.destroy(); this.score+=30; SoundEngine.play('hit'); this.explodeParticles(e.x, e.y, 0x00FFFF, 10); });
                    if(this.currentLevel === 3 && this.boss) this.physics.add.collider(ice, this.boss, (i, b) => { i.destroy(); this.hitBoss(1); });
                }

                if(Phaser.Input.Keyboard.JustDown(this.keys.Z) && this.canDash) { this.canDash = false; this.player.setVelocityX(this.player.flipX ? -1000 : 1000); SoundEngine.play('shoot'); this.time.delayedCall(1000, () => this.canDash = true); }
                if(Phaser.Input.Keyboard.JustDown(this.slowMoKey)) { this.isSlowMo = !this.isSlowMo; this.physics.world.timeScale = this.isSlowMo ? 2.5 : 1; this.centerText.setText(this.isSlowMo ? 'הילוך איטי!' : '').setVisible(this.isSlowMo).setFill('#FFF'); }
                if(Phaser.Input.Keyboard.JustDown(this.coinRainKey) && !this.usedCoinRain) { this.usedCoinRain = true; SoundEngine.play('coin'); for(let i=0; i<20; i++) { let c = this.coinsGroup.create(this.player.x + Phaser.Math.Between(-200, 200), this.player.y - Phaser.Math.Between(300, 600), 'coinTex'); c.setBounce(0.5); c.setCollideWorldBounds(true); } }

                // מגן בועה אקראי
                if(time % 30000 < 50) { this.bubbleShield.setAlpha(1); this.isInvincible = true; this.time.delayedCall(1000, () => { this.bubbleShield.setAlpha(0); this.isInvincible = false; }); }
                this.bubbleShield.x = this.player.x; this.bubbleShield.y = this.player.y;

                if(this.currentLevel === 3 && this.boss && this.boss.getData('isAlive')) {
                    this.bossTalk.setPosition(this.boss.x, this.boss.y - 80);
                    if(this.player.x > 2200) this.bossHealthText.setText('בוס: ' + this.boss.getData('hp') + '/10'); else this.bossHealthText.setText('');
                }

                if(this.player.y > 600) { this.takeDamage(); this.player.x = Math.max(100, this.player.x - 200); this.player.y = 100; this.player.setVelocity(0); }
            },

            explodeParticles: function(x, y, color, qty = 15) {
                let emitter = this.add.particles(x, y, 'particleTex', { speed: { min: -150, max: 150 }, angle: { min: 0, max: 360 }, scale: { start: 1, end: 0 }, tint: color, lifespan: 600, gravityY: 300, quantity: qty, emitting: false });
                emitter.explode();
            },

            takeDamage: function() {
                if(this.isInvincible || !this.gameActive) return;
                this.health--; this.healthText.setText('חיים: ' + this.health); SoundEngine.play('hit'); this.cameras.main.shake(150, 0.01);
                this.isInvincible = true; this.player.setTint(0xFF0000);
                this.time.delayedCall(200, () => this.player.clearTint()); this.time.delayedCall(400, () => this.player.setTint(0xFF0000));
                this.time.delayedCall(1000, () => { this.isInvincible = false; this.player.clearTint(); });
                if(this.health <= 0) { this.gameActive = false; this.player.setTint(0xFF0000); this.centerText.setText('פסילה!\nלחץ R לאיפוס המשחק').setVisible(true).setFill('#FF0000'); }
            },

            hitBoss: function(damage) {
                let hp = this.boss.getData('hp') - damage;
                this.boss.setData('hp', hp); this.boss.setTint(0xFFFFFF); this.time.delayedCall(100, () => this.boss.clearTint()); SoundEngine.play('hit');
                if(hp <= 5 && !this.boss.getData('enraged')) this.boss.setData('enraged', true);
                if(hp <= 2) this.boss.setTint(0x000000); 
                if(hp <= 0) {
                    this.explodeParticles(this.boss.x, this.boss.y, 0xFF0000, 50); this.boss.destroy(); this.gameActive = false; 
                    this.centerText.setText('ניצחון אגדי!').setVisible(true).setFill('#00FF00'); 
                    this.cameras.main.zoomTo(2, 2000); // מצלמה מתקרבת לשחקן המנצח
                }
            },

            startBossAI: function() {
                this.time.addEvent({ delay: 1500, loop: true, callback: () => {
                    if(!this.gameActive || !this.boss || !this.boss.getData('isAlive')) return;
                    let enraged = this.boss.getData('enraged');
                    this.boss.setVelocityY(enraged ? -700 : -600); this.boss.setVelocityX(this.player.x < this.boss.x ? (enraged ? -300 : -200) : (enraged ? 300 : 200));
                    
                    // רעידת אדמה מכה של הבוס
                    if(enraged && Math.random() < 0.3) { this.cameras.main.shake(100, 0.02); }
                    
                    this.bossTalk.setText(['חצוף!', 'צא מפה!', 'לא תנצח!'][Math.floor(Math.random()*3)]).setVisible(true);
                    this.time.delayedCall(1000, () => this.bossTalk.setVisible(false));
                }});
                
                // הבוס יורה כדורי אש עוקבים
                this.time.addEvent({ delay: 3000, loop: true, callback: () => {
                    if(!this.gameActive || !this.boss || !this.boss.getData('isAlive') || this.player.x < 2000) return;
                    let enraged = this.boss.getData('enraged'); let shots = enraged ? 3 : 1; 
                    for(let i=0; i<shots; i++) {
                        this.time.delayedCall(i * 200, () => {
                            if (!this.gameActive || !this.boss || !this.boss.getData('isAlive')) return;
                            let fb = this.fireballs.create(this.boss.x, this.boss.y, 'coinTex').setTint(0x800080).setScale(1.5);
                            
                            // עוקב אחרי השחקן!
                            this.time.addEvent({ delay: 500, repeat: 4, callback: () => {
                                if(fb && fb.active && this.gameActive) this.physics.moveToObject(fb, this.player, enraged ? 450 : 300);
                            }});
                        });
                    }
                }});
            },

            startTrollEvents: function() {
                if(this.currentLevel === 2) {
                    let darkOverlay = this.add.rectangle(1600, 300, 3200, 600, 0x000000).setAlpha(0).setDepth(15);
                    this.time.addEvent({ delay: 20000, loop: true, callback: () => {
                        if(!this.gameActive) return;
                        this.tweens.add({ targets: darkOverlay, alpha: 0.95, duration: 1000, yoyo: true, hold: 3000 });
                    }});
                }
                this.time.addEvent({ delay: 15000, loop: true, callback: () => {
                    if(!this.gameActive || this.currentLevel === 3) return; 
                    this.centerText.setText('אזהרה: מטאורים!').setVisible(true).setFill('#FF0000'); SoundEngine.play('shoot');
                    this.time.delayedCall(1500, () => {
                        if(!this.gameActive) return; this.centerText.setVisible(false);
                        for(let i=0; i<6; i++) {
                            let fb = this.fireballs.create(this.player.x + Phaser.Math.Between(-400, 400), -50, 'powerTex').setTint(0xFF0000);
                            fb.body.allowGravity = true; fb.setVelocityY(Phaser.Math.Between(200, 400));
                            this.physics.add.collider(fb, [this.ground, this.platforms], (f) => f.destroy());
                            this.physics.add.overlap(this.player, fb, (p, f) => { f.destroy(); this.takeDamage(); });
                        }
                    });
                }});
            }
        };

        game.scene.add('MainScene', sceneConfig, true, { level: 1 });
    </script>
</body>
</html>
