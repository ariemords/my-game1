        const SoundEngine = {
            ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); },
            play(type) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.connect(gain); gain.connect(this.ctx.destination); const now = this.ctx.currentTime;
                if (type === 'jump') { osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(600, now + 0.1); gain.gain.setValueAtTime(0.04, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); } 
                else if (type === 'coin') { osc.type = 'sine'; osc.frequency.setValueAtTime(900, now); osc.frequency.setValueAtTime(1200, now + 0.05); gain.gain.setValueAtTime(0.04, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2); osc.start(); osc.stop(now + 0.2); } 
                else if (type === 'hit') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.linearRampToValueAtTime(20, now + 0.3); gain.gain.setValueAtTime(0.08, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3); } 
                else if (type === 'shoot') { osc.type = 'triangle'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.1); gain.gain.setValueAtTime(0.08, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); }
            }
        };

        function explodeParticles(scene, x, y, color, qty = 15) { let emitter = scene.add.particles(x, y, 'particleTex', { speed: { min: -150, max: 150 }, angle: { min: 0, max: 360 }, scale: { start: 1, end: 0 }, tint: color, lifespan: 600, gravityY: 300, quantity: qty, emitting: false }); emitter.explode(); }

        function toggleHelpOverlay(visible) {
            if (!helpOverlay) return;
            helpOverlay.setVisible(visible);
            homeMenuContainer.setVisible(!visible);
            if (tasksOverlay) tasksOverlay.setVisible(false);
        }

        function openTasksPage(scene) {
            if (!tasksOverlay) return;
            gameWasActiveBeforeTasks = gameActive;
            homeMenuActiveBeforeTasks = homeMenuActive;
            homeMenuActive = false;
            if (gameActive) {
                gameActive = false;
                scene.physics.world.pause();
            }
            tasksActive = true;
            tasksOverlay.setVisible(true);
            if (homeMenuContainer) homeMenuContainer.setVisible(false);
            if (helpOverlay) helpOverlay.setVisible(false);
            taskState.claimed = taskState.claimed || {1:false,2:false,3:false};
            updateTaskOverlay();
        }

        function closeTasksPage() {
            tasksActive = false;
            if (tasksOverlay) tasksOverlay.setVisible(false);
            if (gameWasActiveBeforeTasks && !isShopOpen && !isPermanentShopOpen) {
                gameActive = true;
                homeMenuActive = false;
                if (currentScene && currentScene.physics && currentScene.physics.world) {
                    currentScene.physics.world.resume();
                }
                if (homeMenuContainer) homeMenuContainer.setVisible(false);
            } else {
                homeMenuActive = true;
                if (homeMenuContainer) homeMenuContainer.setVisible(true);
            }
            gameWasActiveBeforeTasks = false;
            homeMenuActiveBeforeTasks = false;
        }

        function claimTask(scene, id) {
            if (!tasksOverlay || !tasksOverlay.visible) return;
            if (!taskState.completed[id] || taskState.claimed[id]) {
                SoundEngine.play('hit');
                return;
            }
            taskState.claimed[id] = true;
            let reward = 0;
            if (id === 1) reward = 500;
            if (id === 2) reward = 700;
            if (id === 3) reward = 900;
            score += reward;
            scoreText.setText('ניקוד: ' + score);
            SoundEngine.play('coin');
            updateTaskOverlay();
        }

        function updateTaskOverlay() {
            if (!taskLine1 || !taskLine2 || !taskLine3) return;
            taskLine1.setText(`1. אסוף 40 מטבעות בריצה אחת - ${taskState.completed[1] ? (taskState.claimed[1] ? 'נלקח' : 'מוכן!') : `בוצע ${taskState.coinsRun}/40`}`);
            taskLine2.setText(`2. הורג 8 אויבים בריצה אחת - ${taskState.completed[2] ? (taskState.claimed[2] ? 'נלקח' : 'מוכן!') : `בוצע ${taskState.enemiesRun}/8`}`);
            taskLine3.setText(`3. השלם שלב בלי לקבל נזק - ${taskState.completed[3] ? (taskState.claimed[3] ? 'נלקח' : 'מוכן!') : (taskState.noDamageRun ? 'בשוויון' : 'נכשל')}`);
            taskLine1.setColor(taskState.completed[1] ? (taskState.claimed[1] ? '#888888' : '#00FF00') : '#FFFFFF');
            taskLine2.setColor(taskState.completed[2] ? (taskState.claimed[2] ? '#888888' : '#00FF00') : '#FFFFFF');
            taskLine3.setColor(taskState.completed[3] ? (taskState.claimed[3] ? '#888888' : '#00FF00') : '#FFFFFF');
        }

        function hideHomeMenu() {
            homeMenuActive = false;
            if (homeMenuContainer) homeMenuContainer.setVisible(false);
            if (helpOverlay) helpOverlay.setVisible(false);
            if (tasksOverlay) tasksOverlay.setVisible(false);
            centerText.setVisible(false);
        }

        function resetColliders() {
            activeColliders.forEach(c => { if (c && c.destroy) c.destroy(); });
            activeColliders = [];
        }

        function startGame(scene) {
            if (homeMenuActive) { hideHomeMenu(); }
            if (!gameActive && !isShopOpen && !isPermanentShopOpen) {
                gameActive = true;
                centerText.setVisible(false);
                SoundEngine.init();
                if(currentLevel === 3 || currentLevel === 5) startBossAI(game.scene.scenes[0]);
            }
        }

        function togglePermanentShop(scene) {
            isPermanentShopOpen = !isPermanentShopOpen;
            upgradeShopContainer.setVisible(isPermanentShopOpen);
            if (isPermanentShopOpen) {
                gameActiveBeforePermanentShop = gameActive;
                gameActive = false;
                scene.physics.world.pause();
                centerText.setVisible(false);
            } else {
                scene.physics.world.resume();
                if (gameActiveBeforePermanentShop) {
                    gameActive = true;
                } else {
                    centerText.setVisible(true);
                }
            }
            if (isShopOpen) updateShopLabels();
        }

        function buyPermanentItem(scene, id, price) {
            if (!isPermanentShopOpen || dragonCoins < price) {
                if (isPermanentShopOpen) SoundEngine.play('hit');
                return;
            }
            dragonCoins -= price;
            SoundEngine.play('coin');
            explodeParticles(scene, 400, 300, 0xFFD700, 40);
            if (id === 1) {
                permanentUpgrades.extraLife = true;
                health = Math.max(health, 4);
                if (healthText) healthText.setText('חיים: ' + health);
            }
            if (id === 2) {
                permanentUpgrades.longDash = true;
                dashSpeed = 1600;
            }
            if (id === 3) permanentUpgrades.shopDiscount = true;
            savePermanentProgress();
            updatePermanentUI();
        }

        function toggleShop(scene) {
            isShopOpen = !isShopOpen;
            shopContainer.setVisible(isShopOpen);
            if (isShopOpen) {
                updateShopLabels();
                gameActive = false;
                scene.physics.world.pause(); // מקפיא את המשחק לגמרי!
            } else {
                scene.physics.world.resume();
                if (health > 0 && !centerText.visible) gameActive = true;
            }
        }

        function buyItem(scene, id, price) {
            if (tasksOverlay && tasksOverlay.visible) return;
            let actualPrice = getInGamePrice(price);
            if (!isShopOpen || score < actualPrice) {
                if (isShopOpen) SoundEngine.play('hit'); // אין מספיק כסף
                return;
            }
            score -= actualPrice;
            scoreText.setText('ניקוד: ' + score);
            SoundEngine.play('coin');
            explodeParticles(scene, 400, 300, 0xFFD700, 40); // אפקט קנייה

            if (id === 1) {
                shootDelay = 150;
                specialWeapon = 'ice';
            }
            if (id === 2) { health += 5; healthText.setText('חיים: ' + health); player.setTint(0xFFD700); }
            if (id === 3) { isInvincible = true; bubbleShield.setAlpha(1); scene.time.delayedCall(10000, () => { isInvincible = false; bubbleShield.setAlpha(0); }); }
            if (id === 4 && !hasDrone) { 
                hasDrone = true; 
                attackDrone = scene.physics.add.sprite(player.x, player.y - 50, 'droneTex').setDepth(55);
                attackDrone.body.allowGravity = false;
            }
            if (id === 5) {
                specialWeapon = 'fire';
                shootDelay = 200;
                if (player) player.setTint(0xFF4500);
            }
            if (id === 6) {
                playerSkin = true;
                if (player) player.setTint(0xAA00FF);
            }
            if (id === 7) {
                specialWeapon = 'ultimateIce';
                shootDelay = 100;
                if (player) player.setTint(0x00FFFF);
            }
            if (id === 8) {
                playerSkin = true;
                if (player) player.setTint(0x00AAFF);
            }
        }

                [600, 1200, 1800, 2400].forEach((x) => { let p = platforms.create(x, 400, 'platTex'); p.body.checkCollision.down = false; });
                
                trueBoss = scene.physics.add.sprite(2900, 150, 'stage5DragonImg').setCollideWorldBounds(true).setData('isAlive', true).setData('hp', 20).setVisible(false);
                trueBoss.setDisplaySize(220, 140);
                trueBoss.body.allowGravity = false;
                trueBoss.body.setSize(220, 140, true);
                trueBossVideo = scene.add.video(trueBoss.x, trueBoss.y, 'stage5BossVideo').setOrigin(0.5).setDisplaySize(220, 140).setDepth(98);
                trueBossVideo.play(true);
                trueBossVideo.setLoop(true);
                trueBoss.wing = scene.add.image(trueBoss.x - 45, trueBoss.y - 10, 'dragonWingTex').setOrigin(0.5).setDepth(99);
                trueBoss.mouth = scene.add.image(trueBoss.x + 45, trueBoss.y + 20, 'dragonMouthTex').setOrigin(0.5).setDepth(101);
                scene.tweens.add({ targets: trueBoss.wing, angle: { from: -35, to: 35 }, duration: 420, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
                scene.tweens.add({ targets: trueBoss.mouth, scaleY: { from: 0.8, to: 1.4 }, duration: 300, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
                scene.tweens.add({ targets: trueBoss, y: trueBoss.y - 30, duration: 1200, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
                dragonCoinsGroup.create(2500, 470, 'dragonCoinTex').setBounce(0.5).setCollideWorldBounds(true);
                
                if(gameActive) startBossAI(scene);
            }

            setupCollisions(scene);
            if(!trollEventsStarted) { trollEventsStarted = true; startTrollEvents(scene); }
        }

        function setupCollisions(scene) {
            resetColliders();
            activeColliders.push(scene.physics.add.collider(player, [ground, platforms, iceGround]));
            activeColliders.push(scene.physics.add.collider(enemies, [ground, platforms, iceGround]));
            activeColliders.push(scene.physics.add.collider(powerUps, [ground, platforms, iceGround]));
            activeColliders.push(scene.physics.add.collider(coinsGroup, [ground, platforms, iceGround]));
            activeColliders.push(scene.physics.add.collider(poisonDrops, [ground, platforms, iceGround], (d) => d.destroy()));

            activeColliders.push(scene.physics.add.collider(player, iceGround, () => { if (Math.abs(player.body.velocity.x) > 10) player.setAccelerationX(player.body.velocity.x * 2); else player.setAccelerationX(0); }));
            activeColliders.push(scene.physics.add.overlap(player, goals, () => {
                if (currentLevel < 5 && !pendingLevelAdvance) {
                    pendingLevelAdvance = currentLevel + 1;
                    if (taskState.noDamageRun) taskState.completed[3] = true;
                    updateTaskOverlay();
                }
            }));
            activeColliders.push(scene.physics.add.overlap(player, deathGhost, (p, g) => { takeDamage(scene); g.x = 3000; g.y = 100; }));

            scene.physics.add.collider(player, springs, (p, s) => { p.setVelocityY(gravityFlipped ? 1100 : -1100); SoundEngine.play('coin'); });
            scene.physics.add.collider(player, healSprings, (p, s) => { p.setVelocityY(gravityFlipped ? 900 : -900); if(health < 5) health++; healthText.setText('חיים: ' + health); SoundEngine.play('coin'); });
            scene.physics.add.collider(player, badSprings, (p, s) => { p.setVelocityY(gravityFlipped ? 500 : -500); takeDamage(scene); scene.tweens.add({targets: s, scaleY: 0.5, duration: 50, yoyo: true}); }); 

            if(currentLevel === 2 && fakeGoal) { scene.physics.add.overlap(player, fakeGoal, (p, f) => { explodeParticles(scene, f.x, f.y, 0xFF0000, 30); f.destroy(); SoundEngine.play('hit'); for(let i=0; i<3; i++) enemies.create(f.x + (i*30 - 30), f.y - 50, 'enemyTex').setVelocityX(150).setBounceX(1).setCollideWorldBounds(true); }); }

            scene.physics.add.overlap(player, portals, (p, portal) => { if(!p.getData('teleporting')) { p.setData('teleporting', true); SoundEngine.play('jump'); let target = portal.getData('target'); p.x = target.x; p.y = target.y; scene.time.delayedCall(1000, () => p.setData('teleporting', false)); } });
            scene.physics.add.overlap(player, fakeCoins, (p, fc) => { fc.destroy(); SoundEngine.play('hit'); bats.create(p.x, p.y - 50, 'batTex'); });

            scene.physics.add.collider(player, mysteryBlocks, (p, b) => {
                if (p.body.touching.up && b.body.touching.down && !b.getData('used')) {
                    if(b.texture.key === 'mimicTex') { b.destroy(); takeDamage(scene); explodeParticles(scene, b.x, b.y, 0xFF0000, 20); return; }
                    b.setData('used', true); b.setTint(0x555555); SoundEngine.play('coin'); scene.tweens.add({ targets: b, y: b.y - 10, duration: 50, yoyo: true });
                    if(Math.random() < 0.2) { let d = coinsGroup.create(b.x, b.y - 30, 'diamondTex').setVelocityY(-300); d.setData('diamond', true); } 
                    else { let pwrTypes = [{t:'health', c:0xFF0000}, {t:'star', c:0xFFFF00}, {t:'speed', c:0x00FFFF}, {t:'poison', c:0x800080}]; let pwr = powerUps.create(b.x, b.y - 30, 'powerTex').setTint(pwrTypes[Phaser.Math.Between(0, 3)].c).setVelocityY(-200); pwr.setData('type', pwrTypes[Phaser.Math.Between(0, 3)].t); }
                }
            });

            scene.physics.add.overlap(player, powerUps, (p, pw) => {
                let type = pw.getData('type'); explodeParticles(scene, pw.x, pw.y, pw.tintTopLeft); pw.destroy(); SoundEngine.play('coin');
                if(type === 'poison') { score = Math.max(0, score - 50); scoreText.setText('ניקוד: ' + score); reverseControls = true; player.setTint(0x800080); centerText.setText('שליטה הפוכה!').setVisible(true).setFill('#800080'); scene.time.delayedCall(5000, () => { reverseControls = false; player.clearTint(); if(gameActive) centerText.setVisible(false); }); } 
                else { score += 50; scoreText.setText('ניקוד: ' + score); if(type === 'health') { health++; healthText.setText('חיים: ' + health); } else if(type === 'star') { isInvincible = true; player.setTint(0xFFFF00); scene.time.delayedCall(5000, () => { isInvincible = false; player.clearTint(); }); } else if(type === 'speed') { currentSpeed = 450; player.setTint(0x00FFFF); scene.time.delayedCall(5000, () => { currentSpeed = 250; player.clearTint(); }); } }
            });

            scene.physics.add.collider(iceballs, [ground, platforms], (i) => i.destroy());
            scene.physics.add.collider(iceballs, enemies, (i, e) => {
                i.destroy(); SoundEngine.play('hit');
                if(e.getData('isGiant')) { e.setData('hp', e.getData('hp') - 1); e.setTint(0x00FFFF); scene.time.delayedCall(100, () => e.clearTint()); if(e.getData('hp') <= 0) { e.destroy(); score+=50; scoreText.setText('ניקוד: ' + score); taskState.enemiesRun += 1; if (taskState.enemiesRun >= 8) taskState.completed[2] = true; updateTaskOverlay(); explodeParticles(scene, e.x, e.y, 0xFFFFFF, 30); } } 
                else { e.destroy(); score+=30; scoreText.setText('ניקוד: ' + score); taskState.enemiesRun += 1; if (taskState.enemiesRun >= 8) taskState.completed[2] = true; updateTaskOverlay(); explodeParticles(scene, e.x, e.y, Math.random()*0xFFFFFF, 20); }
            });
            scene.physics.add.collider(iceballs, bats, (i, b) => { b.destroy(); i.destroy(); score+=40; SoundEngine.play('hit'); explodeParticles(scene, b.x, b.y, 0x00FFFF, 10); });
            
            scene.physics.add.collider(player, enemies, (p, e) => {
                if ((!gravityFlipped && p.body.touching.down && e.body.touching.up && p.body.velocity.y > 0) || (gravityFlipped && p.body.touching.up && e.body.touching.down && p.body.velocity.y < 0)) { 
                    p.setVelocityY(gravityFlipped ? (superJumpActive ? 900 : 600) : (isTiny ? -250 : (superJumpActive ? -600 : -350)));
                    if(e.getData('isGiant')) { e.setData('hp', e.getData('hp') - 1); e.setTint(0xFF0000); scene.time.delayedCall(100, () => e.clearTint()); SoundEngine.play('hit'); if(e.getData('hp') <= 0) { e.destroy(); score+=50; taskState.enemiesRun += 1; if (taskState.enemiesRun >= 8) taskState.completed[2] = true; scoreText.setText('ניקוד: ' + score); updateTaskOverlay(); explodeParticles(scene, e.x, e.y, 0xFFFFFF, 30); } }
                    else { e.destroy(); score+=20; taskState.enemiesRun += 1; if (taskState.enemiesRun >= 8) taskState.completed[2] = true; scoreText.setText('ניקוד: ' + score); updateTaskOverlay(); SoundEngine.play('jump'); explodeParticles(scene, e.x, e.y, Math.random()*0xFFFFFF, 20); } 
                } 
                else { takeDamage(scene); if(e.texture.key === 'thiefTex') { hasIcePower = false; centerText.setText('גנבו לך את הקרח!').setVisible(true).setFill('#FF0000'); scene.time.delayedCall(5000, () => { hasIcePower = true; if(gameActive) centerText.setVisible(false); }); } } 
            });
            scene.physics.add.overlap(player, bats, (p, b) => { takeDamage(scene); b.destroy(); healBoss(scene, 1); }); 
            scene.physics.add.overlap(player, missiles, (p, m) => { takeDamage(scene); explodeParticles(scene, m.x, m.y, 0xFF0000, 20); m.destroy(); });
            scene.physics.add.overlap(player, homingFireballs, (p, h) => { takeDamage(scene); explodeParticles(scene, h.x, h.y, 0x0000FF, 20); h.destroy(); });
            scene.physics.add.overlap(player, fallingSpikes, (p, s) => { takeDamage(scene); s.destroy(); });
            scene.physics.add.overlap(player, lasers, () => takeDamage(scene));
            scene.physics.add.overlap(player, defuseOrbs, (p, orb) => { orb.destroy(); bombActive = false; bombText.setVisible(false); SoundEngine.play('coin'); explodeParticles(scene, p.x, p.y, 0x00FF00, 20); });
            scene.physics.add.overlap(player, poisonDrops, (p, d) => { d.destroy(); takeDamage(scene); }); 

            if(currentLevel === 3 && boss) {
                scene.physics.add.overlap(player, lava, () => { health = 0; takeDamage(scene); });
                scene.physics.add.overlap(player, fireballs, (p, f) => { f.destroy(); takeDamage(scene); });
                scene.physics.add.overlap(iceballs, boss, (b, i) => { if(!i.active) return; i.active = false; i.body.enable = false; i.destroy(); hitBoss(scene, boss, 1); });
                scene.physics.add.collider(player, boss, (p, b) => { if ((!gravityFlipped && p.body.touching.down && b.body.touching.up) || (gravityFlipped && p.body.touching.up && b.body.touching.down)) { p.setVelocityY(gravityFlipped ? 600 : -400); hitBoss(scene, boss, 4); } else { takeDamage(scene); } });
            }
            if(currentLevel === 5 && trueBoss) {
                scene.physics.add.overlap(player, lava, () => { player.setVelocityY(-800); takeDamage(scene); }); 
                scene.physics.add.overlap(iceballs, trueBoss, (b, i) => { if(!i.active) return; i.active = false; i.body.enable = false; i.destroy(); hitBoss(scene, trueBoss, 1); });
                scene.physics.add.collider(player, trueBoss, (p, b) => { if ((!gravityFlipped && p.body.touching.down && b.body.touching.up) || (gravityFlipped && p.body.touching.up && b.body.touching.down)) { p.setVelocityY(gravityFlipped ? 600 : -400); hitBoss(scene, trueBoss, 4); } else { takeDamage(scene); } });
                scene.physics.add.overlap(player, fireballs, (p, f) => { f.destroy(); takeDamage(scene); });
            }

            scene.physics.add.overlap(player, coinsGroup, (p, c) => { let val = c.getData('diamond') ? 100 : 10; c.destroy(); score += val; scoreText.setText('ניקוד: ' + score); SoundEngine.play('coin'); taskState.coinsRun += 1; if (taskState.coinsRun >= 40) taskState.completed[1] = true; updateTaskOverlay(); });
        }

        function update(time) {
            if (pendingLevelAdvance && !levelTransitioning) {
                const nextLevel = pendingLevelAdvance;
                pendingLevelAdvance = 0;
                levelTransitioning = true;
                if (currentScene && currentScene.time) {
                    currentScene.time.delayedCall(10, () => {
                        setupLevel(currentScene, nextLevel);
                        levelTransitioning = false;
                    });
                } else {
                    setupLevel(this, nextLevel);
                    levelTransitioning = false;
                }
            }

            if (!gameActive && !isShopOpen) return; // לא לבצע כשהחנות פתוחה

            if(deathGhost && deathGhost.active) { this.physics.moveToObject(deathGhost, player, 60); }
            if(pet) { pet.x += (player.x - 30 - pet.x) * 0.05; pet.y += (player.y - 30 - pet.y) * 0.05; }
            if(currentLevel === 2) { player.body.velocity.x -= 2; } 

            bats.getChildren().forEach(b => { if(Phaser.Math.Distance.Between(b.x, b.y, player.x, player.y) < 400) this.physics.moveToObject(b, player, 150); });
            missiles.getChildren().forEach(m => { this.physics.moveToObject(m, player, 200); m.rotation = Phaser.Math.Angle.Between(m.x, m.y, player.x, player.y); });
            homingFireballs.getChildren().forEach(hf => { this.physics.moveToObject(hf, player, 180); });

            let v = currentSpeed;
            if (reverseControls) {
                if(cursors.left.isDown || keys.A.isDown) { player.setVelocityX(v); player.flipX = false; } else if(cursors.right.isDown || keys.D.isDown) { player.setVelocityX(-v); player.flipX = true; } else player.setVelocityX(0);
            } else {
                if(cursors.left.isDown || keys.A.isDown) { player.setVelocityX(-v); player.flipX = true; } else if(cursors.right.isDown || keys.D.isDown) { player.setVelocityX(v); player.flipX = false; } else player.setVelocityX(0);
            }

            let isTouchingGround = gravityFlipped ? player.body.touching.up : player.body.touching.down;
            if (isTouchingGround) { canDoubleJump = true; }
            
            if (canJumpTroll && (Phaser.Input.Keyboard.JustDown(cursors.up) || Phaser.Input.Keyboard.JustDown(keys.W))) {
                let jv = isTiny ? 400 : (superJumpActive ? 900 : 600);
                if (isTouchingGround) { player.setVelocityY(gravityFlipped ? jv : -jv); SoundEngine.play('jump'); } 
                else if (canDoubleJump) { player.setVelocityY(gravityFlipped ? (jv-100) : -(jv-100)); canDoubleJump = false; SoundEngine.play('jump'); }
            }

            if (cursors.space.isDown) { 
                player.setVelocityY(gravityFlipped ? 300 : -300); 
                explodeParticles(this, player.x, player.y+(gravityFlipped?-15:15), 0xFFA500, 2); 
            }

            if (Math.abs(player.body.velocity.x) > 10 && Math.random() > 0.5) { let ghost = this.add.image(player.x, player.y, player.texture.key); ghost.setTint(hasIcePower ? 0x00FFFF : 0x00FF00); ghost.setAlpha(0.5); ghost.flipX = player.flipX; this.tweens.add({ targets: ghost, alpha: 0, duration: 400, onComplete: () => ghost.destroy() }); }

            if (Phaser.Input.Keyboard.JustDown(gravToggleKey) && score >= 50) { score -= 50; scoreText.setText('ניקוד: ' + score); SoundEngine.play('coin'); flipGravity(this, 3000); }
            if (Phaser.Input.Keyboard.JustDown(superJumpKey)) { superJumpActive = true; SoundEngine.play('coin'); this.time.delayedCall(5000, () => superJumpActive = false); }
            if (Phaser.Input.Keyboard.JustDown(shrinkKey)) { isTiny = !isTiny; player.setScale(isTiny ? 0.5 : 1); SoundEngine.play('coin'); }
            if (Phaser.Input.Keyboard.JustDown(meteorKey)) { let m = fireballs.create(player.x + (player.flipX ? -300 : 300), 0, 'powerTex').setTint(0xFF0000); m.body.allowGravity = true; m.setVelocityY(500); SoundEngine.play('shoot'); }
            
            // ירי עם המשתנה החדש של shootDelay (משתדרג דרך החנות)
            if (Phaser.Input.Keyboard.JustDown(shootKey) && hasIcePower && time > lastShotTime + shootDelay) {
                lastShotTime = time;
                SoundEngine.play('shoot');
                if (specialWeapon === 'ultimateIce') {
                    ['-1','0','1'].forEach((offset, index) => {
                        let ice = iceballs.create(player.x, player.y, 'iceTex');
                        ice.setVelocityX(player.flipX ? -500 : 500);
                        ice.setVelocityY((index - 1) * 100);
                        ice.body.allowGravity = false;
                    });
                } else {
                    let ice = iceballs.create(player.x, player.y, 'iceTex');
                    ice.setVelocityX(player.flipX ? -500 : 500);
                    ice.body.allowGravity = false;
                }
            }
            
            if (Phaser.Input.Keyboard.JustDown(dashKey) && canDash) { canDash = false; player.setVelocityX(player.flipX ? -dashSpeed : dashSpeed); SoundEngine.play('shoot'); this.time.delayedCall(1000, () => canDash = true); }
            if (Phaser.Input.Keyboard.JustDown(coinRainKey) && !usedCoinRain) { usedCoinRain = true; SoundEngine.play('coin'); for(let i=0; i<20; i++) { let c = coinsGroup.create(player.x + Phaser.Math.Between(-200, 200), player.y - Phaser.Math.Between(300, 600), 'coinTex'); c.setBounce(0.5); c.setCollideWorldBounds(true); } }

            // לוגיקת רחפן תקיפה (חדש!)
            if (hasDrone && attackDrone && attackDrone.active) {
                // גורם לרחפן לרחף באופן חלק מעל השחקן
                attackDrone.x += ((player.x + (player.flipX ? 40 : -40)) - attackDrone.x) * 0.1;
                attackDrone.y += ((player.y - 60) - attackDrone.y) * 0.1;

                // יורה על האויב הקרוב ביותר
                if (time > lastDroneShot + 1000) {
                    let nearestEnemy = null;
                    let closestDist = 400; // טווח הירי של הרחפן
                    enemies.getChildren().concat(bats.getChildren()).forEach(e => {
                        let dist = Phaser.Math.Distance.Between(attackDrone.x, attackDrone.y, e.x, e.y);
                        if (dist < closestDist) { closestDist = dist; nearestEnemy = e; }
                    });

                    if (nearestEnemy) {
                        lastDroneShot = time;
                        let plasma = fireballs.create(attackDrone.x, attackDrone.y, 'plasmaTex');
                        plasma.body.allowGravity = false;
                        this.physics.moveToObject(plasma, nearestEnemy, 600);
                        SoundEngine.play('shoot');
                        // מגדיר שאם הפלזמה פוגעת באויב הוא מת
                        this.physics.add.collider(plasma, enemies, (p, e) => { p.destroy(); e.destroy(); score+=30; scoreText.setText('ניקוד: ' + score); explodeParticles(this, e.x, e.y, 0xFF00FF, 20); });
                        this.physics.add.collider(plasma, bats, (p, e) => { p.destroy(); e.destroy(); score+=40; scoreText.setText('ניקוד: ' + score); explodeParticles(this, e.x, e.y, 0xFF00FF, 20); });
                        this.time.delayedCall(1500, () => { if(plasma.active) plasma.destroy(); }); // מחיקת פלזמה אם לא פגעה
                    }
                }
            }

            if(time % 30000 < 50) { bubbleShield.setAlpha(1); isInvincible = true; this.time.delayedCall(1000, () => { bubbleShield.setAlpha(0); isInvincible = false; }); }
            bubbleShield.x = player.x; bubbleShield.y = player.y;

            if (currentLevel === 3 && boss && boss.getData('isAlive')) {
                boss.setFlipX(player.x < boss.x);
                if (boss.wing) {
                    boss.wing.setFlipX(boss.flipX);
                    boss.wing.x = boss.x + (boss.flipX ? 40 : -40);
                    boss.wing.y = boss.y - 10;
                }
                if (boss.mouth) {
                    boss.mouth.setFlipX(boss.flipX);
                    boss.mouth.x = boss.x + (boss.flipX ? 30 : -30);
                    boss.mouth.y = boss.y + 10;
                }
                bossTalk.setPosition(boss.x, boss.y - 80);
                if (player.x > 2200) bossHealthText.setText('הדרקון: ' + boss.getData('hp') + '/10'); else bossHealthText.setText('');
            }
            else if (currentLevel === 5 && trueBoss && trueBoss.getData('isAlive')) {
                trueBoss.setFlipX(player.x < trueBoss.x);
                if (trueBossVideo) {
                    trueBossVideo.setFlipX(trueBoss.flipX);
                    trueBossVideo.setPosition(trueBoss.x, trueBoss.y);
                }
                if (trueBoss.wing) {
                    trueBoss.wing.setFlipX(trueBoss.flipX);
                    trueBoss.wing.x = trueBoss.x + (trueBoss.flipX ? 45 : -45);
                    trueBoss.wing.y = trueBoss.y - 10;
                }
                if (trueBoss.mouth) {
                    trueBoss.mouth.setFlipX(trueBoss.flipX);
                    trueBoss.mouth.x = trueBoss.x + (trueBoss.flipX ? 40 : -40);
                    trueBoss.mouth.y = trueBoss.y + 20;
                }
                bossTalk.setPosition(trueBoss.x, trueBoss.y - 80);
                if (player.x > 2000) bossHealthText.setText('שד הריק: ' + trueBoss.getData('hp') + '/20'); else bossHealthText.setText('');
            } 
            else bossHealthText.setText('');

            if (player && playerWing) { playerWing.setPosition(player.x - 12, player.y - 10); }
            if (player && playerMouth) { playerMouth.setPosition(player.x + 10, player.y + 8); }
            if (player.y > 600 || player.y < -100) { if(currentLevel !== 3 && currentLevel !== 5) { takeDamage(this); player.x = 100; player.y = 100; player.setVelocity(0); } }
            let scroll = this.cameras.main.scrollX;
            if(cloudLayer) cloudLayer.tilePositionX = scroll * 0.1;
            if(bgFront) bgFront.tilePositionX = scroll * 0.6;
        }

        function hitBoss(scene, bTarget, damage) {
            if (!bTarget.getData('isAlive') || bTarget.getData('iFrames')) return;
            bTarget.setData('iFrames', true); scene.time.delayedCall(200, () => { if(bTarget && bTarget.active) bTarget.setData('iFrames', false); });

            let hp = bTarget.getData('hp') - damage;
            bTarget.setData('hp', hp); bTarget.setTint(0xFF0000); scene.time.delayedCall(100, () => bTarget.clearTint()); SoundEngine.play('hit');
            
            if (hp <= 5 && !bTarget.getData('enraged')) bTarget.setData('enraged', true);
            if (hp <= 0) { 
                bTarget.setData('isAlive', false); explodeParticles(scene, bTarget.x, bTarget.y, 0xFF0000, 50); 
                if (bTarget.wing) bTarget.wing.destroy();
                if (bTarget.mouth) bTarget.mouth.destroy();
                if (bTarget === trueBoss && trueBossVideo) { trueBossVideo.destroy(); trueBossVideo = null; }
                bTarget.destroy(); 
                if (taskState.noDamageRun) { taskState.completed[3] = true; updateTaskOverlay(); }
                if (bTarget === boss) { boss = null; }
                if (bTarget === trueBoss) {
                    if (trueBossVideo) { trueBossVideo.destroy(); trueBossVideo = null; }
                    trueBoss = null;
                }
                if(currentLevel === 3) {
                    centerText.setText('הבסת את הדרקון! מתקדם...').setVisible(true);
                    pendingLevelAdvance = 4;
                    currentScene.time.delayedCall(2000, () => {
                        centerText.setVisible(false);
                    });
                } else {
                    gameActive = false; playVictorySequence(scene);
                }
            }
        }
        
        function playVictorySequence(scene) {
            if (victoryVideo) { victoryVideo.destroy(); victoryVideo = null; }
            if (victoryOverlay) { victoryOverlay.destroy(); victoryOverlay = null; }
            if (victoryText) { victoryText.destroy(); victoryText = null; }
            if (centerText) centerText.setVisible(false);
            if (bossHealthText) bossHealthText.setText('');
            scene.physics.world.pause();
            victoryOverlay = scene.add.rectangle(400, 300, 800, 600, 0x000000, 0.8).setScrollFactor(0).setDepth(1200);
            victoryVideo = scene.add.video(400, 300, 'victoryVideo').setOrigin(0.5).setDisplaySize(760, 430).setDepth(1201);
            victoryText = scene.add.text(400, 540, 'נצחת את הדרקון הנורא!', { fontSize: '32px', fill: '#00FF00', fontStyle: 'bold', align: 'center', wordWrap: { width: 740 } }).setOrigin(0.5).setDepth(1202).setVisible(false);
            victoryVideo.play(false);
            if (victoryVideo.video) {
                victoryVideo.video.addEventListener('ended', () => {
                    if (victoryText) victoryText.setVisible(true);
                });
            }
            if (victoryVideo.on) {
                victoryVideo.on('complete', () => {
                    if (victoryText) victoryText.setVisible(true);
                });
            }
        }

        function healBoss(amount) {
            if(currentLevel === 3 && boss && boss.getData('isAlive')) boss.setData('hp', boss.getData('hp') + amount);
            if(currentLevel === 5 && trueBoss && trueBoss.getData('isAlive')) trueBoss.setData('hp', trueBoss.getData('hp') + amount);
        }

        function flipGravity(scene, duration) {
            if(!gameActive || gravityFlipped) return;
            gravityFlipped = true; scene.physics.world.gravity.y = -1000; player.setTint(0x800080); centerText.setText('כוח משיכה הפוך!').setVisible(true).setFill('#800080');
            scene.time.delayedCall(duration, () => { gravityFlipped = false; scene.physics.world.gravity.y = 1000; player.clearTint(); if(gameActive) centerText.setVisible(false); });
        }

        function getInGamePrice(basePrice) {
            return Math.ceil(basePrice * (permanentUpgrades.shopDiscount ? 0.8 : 1));
        }

        function updatePermanentUI() {
            if(dragonCoinText) dragonCoinText.setText('מטבעות דרקון: ' + dragonCoins);
            if(permUpgradesText) {
                let active = [];
                if(permanentUpgrades.extraLife) active.push('+1 חיים');
                if(permanentUpgrades.longDash) active.push('דאש ארוך');
                if(permanentUpgrades.shopDiscount) active.push('הנחות חנות');
                permUpgradesText.setText('שדרוגים: ' + (active.length ? active.join(' | ') : 'אין'));
            }
        }

        function savePermanentProgress() {
            try {
                localStorage.setItem('dragonCoins', dragonCoins.toString());
                localStorage.setItem('permanentUpgrades', JSON.stringify(permanentUpgrades));
            } catch(e) {
                console.warn('לא ניתן לשמור ב-localStorage', e);
            }
        }

        function loadPermanentProgress() {
            try {
                let storedCoins = parseInt(localStorage.getItem('dragonCoins'), 10);
                if (!isNaN(storedCoins)) dragonCoins = storedCoins;
                let stored = localStorage.getItem('permanentUpgrades');
                if (stored) {
                    let parsed = JSON.parse(stored);
                    permanentUpgrades = Object.assign(permanentUpgrades, parsed);
                }
            } catch(e) {
                console.warn('לא ניתן לטעון נתונים מ-localStorage', e);
            }
        }

        function updateShopLabels() {
            if (!shopItemTexts || !shopItemTexts.length) return;
            shopItemTexts[0].setText(`1. רובה קרח מהיר [${getInGamePrice(300)} נק']`);
            shopItemTexts[1].setText(`2. שריון זהב (+5 חיים) [${getInGamePrice(500)} נק']`);
            shopItemTexts[2].setText(`3. מגן בועה זמני [${getInGamePrice(200)} נק']`);
            shopItemTexts[3].setText(`4. רחפן תקיפה מלווה [${getInGamePrice(800)} נק']`);
            shopItemTexts[4].setText(`5. תותח אש חזק [${getInGamePrice(1000)} נק']`);
            shopItemTexts[5].setText(`6. סקין סודי לשחקן [${getInGamePrice(700)} נק']`);
            shopItemTexts[6].setText(`7. קסם קרח אולטימטיבי [${getInGamePrice(1200)} נק']`);
            shopItemTexts[7].setText(`8. לשדרג מראה דרקון [${getInGamePrice(900)} נק']`);
        }

        function takeDamage(scene) {
            if (isInvincible || !gameActive) return;
            health--; healthText.setText('חיים: ' + health); SoundEngine.play('hit'); scene.cameras.main.shake(150, 0.01);
            score = Math.max(0, score - 30); scoreText.setText('ניקוד: ' + score); 
            for(let i=0; i<3; i++) { let c = coinsGroup.create(player.x, player.y, 'coinTex'); c.setVelocity(Phaser.Math.Between(-200,200), -200); c.setBounce(0.5); c.setCollideWorldBounds(true); }
            
            isInvincible = true; player.setTint(0xFF0000);
            scene.time.delayedCall(200, () => player.clearTint()); scene.time.delayedCall(400, () => player.setTint(0xFF0000));
            scene.time.delayedCall(1000, () => { isInvincible = false; player.clearTint(); });
            if (health <= 0) { gameActive = false; player.setTint(0xFF0000); centerText.setText('פסילה!\nלחץ R כדי להתחיל מחדש').setVisible(true).setFill('#FF0000'); }
            taskState.noDamageRun = false;
        }

        function startBossAI(scene) {
            scene.time.addEvent({ delay: 1500, loop: true, callback: () => {
                if (!gameActive) return;
                if (currentLevel === 3 && boss && boss.getData('isAlive')) { boss.setVelocityY(boss.getData('enraged') ? -500 : -400); boss.setVelocityX(player.x < boss.x ? -150 : 150); }
                if (currentLevel === 5 && trueBoss && trueBoss.getData('isAlive')) { trueBoss.setVelocityY(-300); trueBoss.setVelocityX(player.x < trueBoss.x ? -100 : 100); }
            }});
            scene.time.addEvent({ delay: 3000, loop: true, callback: () => {
                if (!gameActive) return;
                if (currentLevel === 3 && boss && boss.getData('isAlive') && player.x > 2000) {
                    let water = homingFireballs.create(boss.x, boss.y, 'blueFireTex').setScale(1.2);
                    water.body.allowGravity = false;
                    scene.physics.moveToObject(water, player, 300);
                }
                if (currentLevel === 5 && trueBoss && trueBoss.getData('isAlive') && player.x > 2000) {
                    let ms = missiles.create(trueBoss.x, trueBoss.y, 'missileTex');
                    ms.body.allowGravity = false;
                    scene.physics.moveToObject(ms, player, 400);
                    let hfb = homingFireballs.create(trueBoss.x, trueBoss.y, 'blueFireTex');
                    hfb.body.allowGravity = false;
                    scene.physics.moveToObject(hfb, player, 250);
                }
            }});
            scene.time.addEvent({ delay: 8000, loop: true, callback: () => {
                if (!gameActive || !boss || !boss.getData('isAlive') || currentLevel !== 3) return;
                let fb = fireballs.create(player.x + Phaser.Math.Between(-100, 100), 550, 'powerTex').setTint(0xFF4500); fb.body.allowGravity = true; fb.setVelocityY(-600);
            }});
        }

        function startTrollEvents(scene) {
            scene.time.addEvent({ delay: 25000, loop: true, callback: () => {
                if(!gameActive) return; triggerDarknessSequence(scene);
            }});
            scene.time.addEvent({ delay: 28000, loop: true, callback: () => {
                if(!gameActive) return; canJumpTroll = false; centerText.setText('קללת כבדות!').setVisible(true).setFill('#800080'); scene.time.delayedCall(3000, () => { canJumpTroll = true; if(gameActive) centerText.setVisible(false); });
            }});
            scene.time.addEvent({ delay: 22000, loop: true, callback: () => {
                if(!gameActive) return; currentSpeed = 80; centerText.setText('חילזון!').setVisible(true).setFill('#00FF00'); scene.time.delayedCall(4000, () => { currentSpeed = 250; if(gameActive) centerText.setVisible(false); });
            }});
            scene.time.addEvent({ delay: 18000, loop: true, callback: () => {
                if(!gameActive) return; for(let i=0; i<10; i++) { let d = poisonDrops.create(player.x + Phaser.Math.Between(-400, 400), -50, 'poisonDropTex'); d.body.allowGravity = true; }
            }});
            scene.time.addEvent({ delay: 45000, loop: true, callback: () => {
                if(!gameActive) return; scene.cameras.main.rotation = Math.PI; centerText.setText('מצלמה הפוכה!').setVisible(true).setFill('#FF00FF'); scene.time.delayedCall(3000, () => { scene.cameras.main.rotation = 0; if(gameActive) centerText.setVisible(false); });
            }});
            scene.time.addEvent({ delay: 20000, loop: true, callback: () => {
                if(!gameActive) return; scene.cameras.main.shake(1000, 0.02); reverseControls = true; centerText.setText('רעידת אדמה!').setVisible(true).setFill('#FF8C00'); scene.time.delayedCall(2000, () => { reverseControls = false; if(gameActive && !scene.cameras.main.rotation) centerText.setVisible(false); });
            }});
            scene.time.addEvent({ delay: 13000, loop: true, callback: () => {
                if(!gameActive) return; let spike = fallingSpikes.create(player.x, 0, 'spikeTex'); spike.body.allowGravity = true; spike.setVelocityY(400);
            }});
            scene.time.addEvent({ delay: 35000, loop: true, callback: () => {
                if(!gameActive || bombActive || currentLevel === 4) return;
                bombActive = true; bombTimer = 10; bombText.setVisible(true);
                defuseOrbs.create(player.x + Phaser.Math.Between(-300, 300), 400, 'defuseTex'); 
                let bInterval = setInterval(() => {
                    if(!bombActive) { clearInterval(bInterval); return; }
                    bombTimer--; bombText.setText(bombTimer);
                    if(bombTimer <= 0) { clearInterval(bInterval); bombActive = false; bombText.setVisible(false); takeDamage(scene); takeDamage(scene); explodeParticles(scene, player.x, player.y, 0xFF0000, 50); }
                }, 1000);
            }});
        }
    </script>
</body>
</html>
