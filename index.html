<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer Ultra - Safe Sound Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: Arial, sans-serif; }
        #game-container { box-shadow: 0 0 30px rgba(0,0,0,0.8); border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        // --- מערכת צלילים מתוקנת (נטענת רק בלחיצה!) ---
        const SoundEngine = {
            ctx: null,
            init() {
                // המערכת הזו תופעל רק כשהשחקן ילחץ רווח
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            },
            play(type) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                const now = this.ctx.currentTime;

                if (type === 'jump') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(); osc.stop(now + 0.1);
                } else if (type === 'coin') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(900, now);
                    osc.frequency.setValueAtTime(1200, now + 0.05);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(); osc.stop(now + 0.2);
                } else if (type === 'hit') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(100, now);
                    osc.frequency.linearRampToValueAtTime(20, now + 0.3);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                    osc.start(); osc.stop(now + 0.3);
                }
            }
        };

        const config = {
            type: Phaser.AUTO,
            width: 800, height: 600,
            parent: 'game-container',
            physics: { default: 'arcade', arcade: { gravity: { y: 1000 }, debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, ground, platforms, mysteryBlocks, powerUps, enemies, boss, cursors, keys, restartKey;
        let score = 0, health = 3, bossHealth = 3, gameActive = false, isInvincible = false, currentSpeed = 250;
        let scoreText, healthText, centerText;

        function preload() {}

        function create() {
            // איפוס מצב בכל התחלה מחדש
            score = 0; health = 3; bossHealth = 3; gameActive = false; isInvincible = false;

            this.physics.world.setBounds(0, 0, 3200, 600);
            this.cameras.main.setBounds(0, 0, 3200, 600).setBackgroundColor('#87CEEB');
            
            // ציור הגרפיקה הפנימית
            let g = this.make.graphics({ x: 0, y: 0, add: false });
            g.fillStyle(0x00FF00); g.fillRect(0, 0, 32, 32); g.generateTexture('playerTexture', 32, 32); g.clear();
            g.fillStyle(0x8B4513); g.fillRect(0, 0, 400, 40); g.generateTexture('groundTexture', 400, 40); g.clear();
            g.fillStyle(0xDEB887); g.fillRect(0, 0, 150, 20); g.generateTexture('platformTexture', 150, 20); g.clear();
            g.fillStyle(0xFF8C00); g.fillRect(0, 0, 40, 40); g.generateTexture('blockTexture', 40, 40); g.clear();
            g.fillStyle(0xFFFFFF); g.fillRect(0, 0, 20, 20); g.generateTexture('powerTexture', 20, 20); g.clear();
            g.fillStyle(0xFF0000); g.fillRect(0, 0, 100, 100); g.generateTexture('bossTexture', 100, 100);

            ground = this.physics.add.staticGroup();
            for (let x = 0; x < 3200; x += 400) ground.create(x + 200, 580, 'groundTexture');

            platforms = this.physics.add.staticGroup();
            [500, 900, 1300, 2000].forEach((x, i) => {
                let p = platforms.create(x, 450 - (i*30), 'platformTexture');
                p.body.checkCollision.down = false; 
                p.body.checkCollision.left = false; 
                p.body.checkCollision.right = false;
            });

            mysteryBlocks = this.physics.add.staticGroup();
            [[450, 300], [900, 200], [1400, 300]].forEach(pos => mysteryBlocks.create(pos[0], pos[1], 'blockTexture').setData('used', false));

            powerUps = this.physics.add.group();
            enemies = this.physics.add.group();
            [[600, 500], [1100, 500], [1600, 500], [2300, 500]].forEach(pos => {
                let e = enemies.create(pos[0], pos[1], 'playerTexture').setTint(0x800080).setVelocityX(100).setBounceX(1).setCollideWorldBounds(true);
            });

            player = this.physics.add.sprite(100, 450, 'playerTexture').setBounce(0.1).setCollideWorldBounds(true);
            this.cameras.main.startFollow(player, true, 0.05, 0.05);

            boss = this.physics.add.sprite(2900, 400, 'bossTexture').setBounce(0.2).setCollideWorldBounds(true).setData('isAlive', true);

            // התנגשויות מסודרות
            this.physics.add.collider(player, ground);
            this.physics.add.collider(player, platforms);
            this.physics.add.collider(powerUps, ground);
            this.physics.add.collider(powerUps, platforms);
            this.physics.add.collider(enemies, ground);
            this.physics.add.collider(boss, ground);
            
            this.physics.add.collider(player, mysteryBlocks, (p, b) => {
                if (p.body.touching.up && b.body.touching.down && !b.getData('used')) {
                    b.setData('used', true); b.setTint(0x555555);
                    SoundEngine.play('coin');
                    let pwr = powerUps.create(b.x, b.y - 30, 'powerTexture').setTint(0xFFFF00).setVelocityY(-200);
                }
            });
            
            this.physics.add.overlap(player, powerUps, (p, pw) => { 
                pw.destroy(); score += 50; scoreText.setText('ניקוד: ' + score); SoundEngine.play('coin'); 
            });
            
            this.physics.add.collider(player, enemies, (p, e) => {
                if (p.body.touching.down && e.body.touching.up) { 
                    e.destroy(); p.setVelocityY(-350); score += 20; scoreText.setText('ניקוד: ' + score); SoundEngine.play('jump'); 
                } else takeDamage(this);
            });
            
            this.physics.add.collider(player, boss, (p, b) => {
                if (p.body.touching.down && b.body.touching.up) { 
                    p.setVelocityY(-400); bossHealth--; SoundEngine.play('hit'); 
                    if(bossHealth<=0) { b.destroy(); gameActive=false; centerText.setText('ניצחון! R לאיפוס').setVisible(true); } 
                } else takeDamage(this);
            });

            cursors = this.input.keyboard.createCursorKeys();
            keys = this.input.keyboard.addKeys('W,A,D,SPACE');
            restartKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.R);

            scoreText = this.add.text(16, 16, 'ניקוד: 0', { fontSize: '24px', fill: '#000', fontStyle: 'bold' }).setScrollFactor(0);
            healthText = this.add.text(16, 50, 'חיים: 3', { fontSize: '24px', fill: '#000', fontStyle: 'bold' }).setScrollFactor(0);
            centerText = this.add.text(400, 300, 'רווח - התחל | R - איפוס', { fontSize: '32px', fill: '#000', fontStyle: 'bold' }).setOrigin(0.5).setScrollFactor(0);

            this.input.keyboard.on('keydown-SPACE', () => { 
                if (!gameActive && centerText.text.includes('התחל')) { 
                    gameActive = true; 
                    centerText.setVisible(false);
                    SoundEngine.init(); // מפעיל את הסאונד בצורה בטוחה!
                } 
            });
        }

        function update() {
            if (Phaser.Input.Keyboard.JustDown(restartKey)) this.scene.restart();
            if (!gameActive) return;
            
            if (cursors.left.isDown || keys.A.isDown) player.setVelocityX(-currentSpeed);
            else if (cursors.right.isDown || keys.D.isDown) player.setVelocityX(currentSpeed);
            else player.setVelocityX(0);
            
            if ((cursors.up.isDown || keys.W.isDown || cursors.space.isDown) && player.body.touching.down) { 
                player.setVelocityY(-600); 
                SoundEngine.play('jump'); 
            }
        }

        function takeDamage(scene) {
            if (isInvincible || !gameActive) return;
            health--; healthText.setText('חיים: ' + health);
            SoundEngine.play('hit');
            isInvincible = true; 
            player.setTint(0xFF0000);
            scene.time.delayedCall(200, () => player.clearTint());
            scene.time.delayedCall(1000, () => isInvincible = false);
            if (health <= 0) { gameActive = false; centerText.setText('פסילה! R לאיפוס').setVisible(true); }
        }
    </script>
</body>
</html>
