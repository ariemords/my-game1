    <script>
        window.onerror = function(msg, url, line, column, error) {
            let errDiv = document.getElementById('error-msg');
            if (!errDiv) return false;
            errDiv.style.display = 'block';
            let text = "Error:<br>" + msg + "<br>Line: " + line + ", Column: " + column;
            if (error && error.stack) {
                text += "<br>Stack:<br>" + error.stack.replace(/\n/g, '<br>');
            }
            if (url) {
                text += "<br>Script: " + url;
            }
            errDiv.innerHTML = text;
            return false;
        };

        window.addEventListener('unhandledrejection', function(event) {
            let errDiv = document.getElementById('error-msg');
            if (!errDiv) return;
            errDiv.style.display = 'block';
            let reason = event.reason;
            let text = "Unhandled rejection:<br>" + (reason && reason.message ? reason.message : reason);
            if (reason && reason.stack) {
                text += "<br>Stack:<br>" + reason.stack.replace(/\n/g, '<br>');
            }
            errDiv.innerHTML = text;
            event.preventDefault();
        });
    </script>

                if (!this.ctx) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.connect(gain); gain.connect(this.ctx.destination); const now = this.ctx.currentTime;
                if (type === 'jump') { osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(600, now + 0.1); gain.gain.setValueAtTime(0.04, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); } 
                else if (type === 'coin') { osc.type = 'sine'; osc.frequency.setValueAtTime(900, now); osc.frequency.setValueAtTime(1200, now + 0.05); gain.gain.setValueAtTime(0.04, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2); osc.start(); osc.stop(now + 0.2); }

                else if (type === 'shoot') { osc.type = 'triangle'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.1); gain.gain.setValueAtTime(0.08, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); }

        function showError(err) {
            let errDiv = document.getElementById('error-msg');
            if (!errDiv) return;
            errDiv.style.display = 'block';
            if (err instanceof Error) {
                errDiv.innerHTML = "Error:<br>" + err.message + "<br>Stack:<br>" + err.stack.replace(/\n/g, '<br>');
            } else {
                errDiv.innerHTML = "Error: " + err;
            }
        }

        function toggleHelpOverlay(visible) {
            if (!helpOverlay) return;
            helpOverlay.setVisible(visible);
            homeMenuContainer.setVisible(!visible);
            if (tasksOverlay) tasksOverlay.setVisible(false);
        }

        function openTasksPage(scene) {
            if (!tasksOverlay) return;
            gameWasActiveBeforeTasks = gameActive;
            homeMenuActiveBeforeTasks = homeMenuActive;
            homeMenuActive = false;
            if (gameActive) {
                gameActive = false;
                scene.physics.world.pause();
            }
            tasksActive = true;
            tasksOverlay.setVisible(true);
            if (homeMenuContainer) homeMenuContainer.setVisible(false);
            if (helpOverlay) helpOverlay.setVisible(false);
            taskState.claimed = taskState.claimed || {1:false,2:false,3:false};
            updateTaskOverlay();
        }

        function closeTasksPage() {
            tasksActive = false;
            if (tasksOverlay) tasksOverlay.setVisible(false);
            if (gameWasActiveBeforeTasks && !isShopOpen && !isPermanentShopOpen) {
                gameActive = true;
                homeMenuActive = false;
                if (currentScene && currentScene.physics && currentScene.physics.world) {
                    currentScene.physics.world.resume();
                }
                if (homeMenuContainer) homeMenuContainer.setVisible(false);
            } else {
                homeMenuActive = true;
                if (homeMenuContainer) homeMenuContainer.setVisible(true);
            }
            gameWasActiveBeforeTasks = false;
            homeMenuActiveBeforeTasks = false;
        }

        function claimTask(scene, id) {
            if (!tasksOverlay || !tasksOverlay.visible) return;
            if (!taskState.completed[id] || taskState.claimed[id]) {
                SoundEngine.play('hit');
                return;
            }
            taskState.claimed[id] = true;
            let reward = 0;
            if (id === 1) reward = 500;
            if (id === 2) reward = 700;
            if (id === 3) reward = 900;
            score += reward;
            scoreText.setText('Score: ' + score);
            SoundEngine.play('coin');
            updateTaskOverlay();
        }

        function updateTaskOverlay() {
            if (!taskLine1 || !taskLine2 || !taskLine3) return;
            taskLine1.setText(`1. Collect 40 coins in one run - ${taskState.completed[1] ? (taskState.claimed[1] ? 'Claimed' : 'Ready!') : `Done ${taskState.coinsRun}/40`}`);
            taskLine2.setText(`2. Defeat 8 enemies in one run - ${taskState.completed[2] ? (taskState.claimed[2] ? 'Claimed' : 'Ready!') : `Done ${taskState.enemiesRun}/8`}`);
            taskLine3.setText(`3. Complete a level without taking damage - ${taskState.completed[3] ? (taskState.claimed[3] ? 'Claimed' : 'Ready!') : (taskState.noDamageRun ? 'Perfect' : 'Failed')}`);
            taskLine1.setColor(taskState.completed[1] ? (taskState.claimed[1] ? '#888888' : '#00FF00') : '#FFFFFF');
            taskLine2.setColor(taskState.completed[2] ? (taskState.claimed[2] ? '#888888' : '#00FF00') : '#FFFFFF');
            taskLine3.setColor(taskState.completed[3] ? (taskState.claimed[3] ? '#888888' : '#00FF00') : '#FFFFFF');
        }

        function hideHomeMenu() {
            homeMenuActive = false;
            if (homeMenuContainer) homeMenuContainer.setVisible(false);
            if (helpOverlay) helpOverlay.setVisible(false);
            if (tasksOverlay) tasksOverlay.setVisible(false);
            centerText.setVisible(false);
        }

        function resetColliders() {
            activeColliders.forEach(c => { if (c && c.destroy) c.destroy(); });
            activeColliders = [];
        }

        function clearTrollEvents() {
            trollEventHandles.forEach(ev => { if (ev && ev.remove) ev.remove(false); });
            trollEventHandles = [];
            trollEventsStarted = false;
        }

        function startTwoPlayerGame(scene) {
            isTwoPlayerMode = true;
            health = 5;
            player2Health = 5;
            isInvincible = false;
            isInvincible2 = false;
            healthText.setText('P1 Health: ' + health);
            player2HealthText.setText('P2 Health: ' + player2Health).setVisible(true);
            if (homeMenuActive) { hideHomeMenu(); }
            if (!gameActive && !isShopOpen && !isPermanentShopOpen) {
                clearTrollEvents();
                gameActive = true;
                centerText.setVisible(false);
                SoundEngine.init();
                setupTwoPlayerLevel(scene, 1);
            }
        }

        function startGame(scene) {
            isTwoPlayerMode = false;
            health = 3;
            isInvincible = false;
            isInvincible2 = false;
            healthText.setText('Health: ' + health);
            player2HealthText.setVisible(false);

                clearTrollEvents();
                gameActive = true;
                centerText.setVisible(false);
                SoundEngine.init();
                setupLevel(scene, 1);
            }
        }

        function triggerDarknessSequence(scene) {
            let wizard = scene.add.container(720, 100).setScrollFactor(0).setDepth(310).setAlpha(0);
            let wizardBody = scene.add.image(0, 0, 'wizardTex').setOrigin(0.5, 0.5);
            let wizardWand = scene.add.image(14, -3, 'wandTex').setOrigin(0, 0.5);
            wizard.add([wizardBody, wizardWand]);
            scene.tweens.add({ targets: wizard, alpha: 1, duration: 200 });
            scene.time.delayedCall(100, () => {
                scene.tweens.add({
                    targets: wizardWand,
                    props: { angle: { value: 20, duration: 200, ease: 'Sine.easeInOut' }, x: { value: 24, duration: 200, ease: 'Sine.easeInOut' } },
                    yoyo: true,
                    repeat: 3
                });
            });
            for (let i = 0; i < 3; i++) {
                scene.time.delayedCall(400 + i * 250, () => {
                    let flash = scene.add.rectangle(400, 300, 800, 600, 0xFFFFFF, 0.9).setScrollFactor(0).setDepth(320);
                    scene.time.delayedCall(90, () => flash.destroy());
                });
            }
            scene.time.delayedCall(1400, () => {
                let blind = scene.add.rectangle(400, 300, 800, 600, 0x000000, 1).setScrollFactor(0).setDepth(400);
                scene.time.delayedCall(1000, () => { blind.destroy(); wizard.destroy(); });
            });
        }

                enemies.getChildren().forEach(e => {

            keys = this.input.keyboard.addKeys('W,A,D,S,Q,E,SPACE');

            shopKey = this.input.keyboard.addKey('N');
            shiftKey = this.input.keyboard.addKey('SHIFT');

            // Two-player keys (arrow keys)
            key2Left = cursors.left;
            key2Right = cursors.right;
            key2Jump = cursors.up;
            key2Shoot = cursors.down;
            
            // שינוי ה-E לבנייה כדי שלא יתנגש עם ה-Q של הירייה
            buildKey1 = this.input.keyboard.addKey('E');
            buildKey2 = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.PLUS);

            createHomeMenu(this);
            
            // התיקון הקריטי: מתחיל משחק *רק* אם אנחנו בתפריט הראשי!
            this.input.keyboard.on('keydown-W', () => { if (homeMenuActive) startGame(this); });
            this.input.keyboard.on('keydown-UP', () => { if (homeMenuActive) startGame(this); });
            this.input.keyboard.on('keydown-SPACE', () => { if (homeMenuActive) startGame(this); });
            
            // opening Shop
            this.input.keyboard.on('keydown-N', () => { if(!homeMenuActive && !isUpgradeMenuOpen) toggleShop(this); });
            this.input.keyboard.on('keydown-B', () => { if(!homeMenuActive && !gameActive && !isShopOpen && !isUpgradeMenuOpen) togglePermanentShop(this); });
            this.input.keyboard.on('keydown-M', () => { if(tasksOverlay && !tasksOverlay.visible && !isShopOpen && !isPermanentShopOpen && !isUpgradeMenuOpen) openTasksPage(this); });
            this.input.keyboard.on('keydown-ONE', () => { if (isUpgradeMenuOpen) pickUpgrade(this, 1); else if(tasksOverlay && tasksOverlay.visible) claimTask(this, 1); });
            this.input.keyboard.on('keydown-TWO', () => { if (isUpgradeMenuOpen) pickUpgrade(this, 2); else if(tasksOverlay && tasksOverlay.visible) claimTask(this, 2); });
            this.input.keyboard.on('keydown-THREE', () => { if (isUpgradeMenuOpen) pickUpgrade(this, 3); else if(tasksOverlay && tasksOverlay.visible) claimTask(this, 3); });

            this.input.keyboard.on('keydown-R', () => { window.location.reload(); });

            loadPermanentProgress();
            
            // יצירת הקבוצות לפני קריאה ל-setupLevel כדי למנוע את הקריסה
            fallingPlatforms = this.physics.add.group();
            hiddenWalls = this.physics.add.staticGroup();
            redBlocks = this.physics.add.staticGroup();
            blueBlocks = this.physics.add.staticGroup();

            setupLevel(this, 1);
            updatePermanentUI();
            createShop(this); // create shop menu in the background
            createPermanentShop(this);
            createRunUpgradeMenu(this);
        }

        function clearTemporaryUpgrades() {
            if (tempUpgradeBackup.shootDelay !== null) shootDelay = tempUpgradeBackup.shootDelay;
            if (tempUpgradeBackup.specialWeapon !== null) specialWeapon = tempUpgradeBackup.specialWeapon;
            if (tempUpgradeBackup.hasDrone !== null) {
                hasDrone = tempUpgradeBackup.hasDrone;
                if (!hasDrone && attackDrone) { attackDrone.destroy(); attackDrone = null; }
            }
            if (tempUpgradeBackup.currentSpeed !== null) currentSpeed = tempUpgradeBackup.currentSpeed;
            if (tempUpgradeBackup.dashSpeed !== null) dashSpeed = tempUpgradeBackup.dashSpeed;
            if (tempUpgradeBackup.isInvincible !== null) {
                isInvincible = tempUpgradeBackup.isInvincible;
                if (!isInvincible && bubbleShield) bubbleShield.setAlpha(0);
            }
            if (tempUpgradeBackup.gravityY !== null && currentScene) {
                currentScene.physics.world.gravity.y = tempUpgradeBackup.gravityY;
            }
            tempUpgradeBackup = { shootDelay: null, specialWeapon: null, hasDrone: null, currentSpeed: null, dashSpeed: null, isInvincible: null, gravityY: null };
        }

        function buyPermanentItem(scene, id, price) {
            if (!isPermanentShopOpen || dragonCoins < price) {
                if (isPermanentShopOpen) SoundEngine.play('hit');
                return;
            }
            dragonCoins -= price;
            SoundEngine.play('coin');
            explodeParticles(scene, 400, 300, 0xFFD700, 40);
            if (id === 1) {
                permanentUpgrades.extraLife = true;
                health = Math.max(health, 4);
                if (healthText) healthText.setText('Health: ' + health);
            }
            if (id === 2) {
                permanentUpgrades.longDash = true;
                dashSpeed = 1600;
            }
            if (id === 3) permanentUpgrades.shopDiscount = true;
            savePermanentProgress();
            updatePermanentUI();
        }

        function buyItem(scene, id, price) {
            if (tasksOverlay && tasksOverlay.visible) return;
            let actualPrice = getInGamePrice(price);
            if (!isShopOpen || score < actualPrice) {
                if (isShopOpen) SoundEngine.play('hit'); // not enough money
                return;
            }
            score -= actualPrice;
            scoreText.setText('Score: ' + score);
            SoundEngine.play('coin');
            explodeParticles(scene, 400, 300, 0xFFD700, 40); // purchase effect

            if (id === 1) {
                shootDelay = 150;
                specialWeapon = 'ice';
            }
            if (id === 2) { health += 5; healthText.setText('Health: ' + health); player.setTint(0xFFD700); }
            if (id === 3) { isInvincible = true; bubbleShield.setAlpha(1); scene.time.delayedCall(10000, () => { isInvincible = false; bubbleShield.setAlpha(0); }); }

            }
            if (id === 5) {
                specialWeapon = 'fire';
                shootDelay = 200;
                if (player) player.setTint(0xFF4500);
            }
            if (id === 6) {
                playerSkin = true;
                if (player) player.setTint(0xAA00FF);
            }
            if (id === 7) {
                specialWeapon = 'ultimateIce';
                shootDelay = 100;
                if (player) player.setTint(0x00FFFF);
            }
            if (id === 8) {
                playerSkin = true;
                if (player) player.setTint(0x00AAFF);
            }
        }

                    p.setVelocityY(-300); isGroundPounding = false;
                } else if ((!gravityFlipped && p.body.touching.down && e.body.touching.up && p.body.velocity.y > 0) || (gravityFlipped && p.body.touching.up && e.body.touching.down && p.body.velocity.y < 0)) { 
                    p.setVelocityY(gravityFlipped ? (superJumpActive ? 900 : 600) : (superJumpActive ? -600 : -350));
                    if(e.getData('isGiant')) { e.setData('hp', e.getData('hp') - 1); e.setTint(0xFF0000); scene.time.delayedCall(100, () => e.clearTint()); SoundEngine.play('hit'); if(e.getData('hp') <= 0) { e.destroy(); score+=50; taskState.enemiesRun += 1; if (taskState.enemiesRun >= 8) taskState.completed[2] = true; scoreText.setText('Score: ' + score); updateTaskOverlay(); explodeParticles(scene, e.x, e.y, 0xFFFFFF, 30); } }
                    else { e.destroy(); score+=20; taskState.enemiesRun += 1; if (taskState.enemiesRun >= 8) taskState.completed[2] = true; scoreText.setText('Score: ' + score); updateTaskOverlay(); incrementSuperCharge(); SoundEngine.play('jump'); explodeParticles(scene, e.x, e.y, Math.random()*0xFFFFFF, 20); } 
                } 
                else { takeDamage(scene); if(e.texture.key === 'thiefTex') { hasIcePower = false; centerText.setText('Your ice was stolen!').setVisible(true).setFill('#FF0000'); scene.time.delayedCall(5000, () => { hasIcePower = true; if(gameActive) centerText.setVisible(false); }); } } 
            });
            scene.physics.add.overlap(player, bats, (p, b) => { takeDamage(scene); b.destroy(); healBoss(scene, 1); }); 
            scene.physics.add.overlap(player, missiles, (p, m) => { takeDamage(scene); explodeParticles(scene, m.x, m.y, 0xFF0000, 20); m.destroy(); });
            scene.physics.add.overlap(player, homingFireballs, (p, h) => { takeDamage(scene); explodeParticles(scene, h.x, h.y, 0x0000FF, 20); h.destroy(); });
            scene.physics.add.overlap(player, fallingSpikes, (p, s) => { takeDamage(scene); s.destroy(); });
            scene.physics.add.overlap(player, lasers, () => takeDamage(scene));
            scene.physics.add.overlap(player, defuseOrbs, (p, orb) => { orb.destroy(); bombActive = false; bombText.setVisible(false); SoundEngine.play('coin'); explodeParticles(scene, p.x, p.y, 0x00FF00, 20); });
            scene.physics.add.overlap(player, poisonDrops, (p, d) => { d.destroy(); takeDamage(scene); }); 

            if(currentLevel === 3 && boss) {
                scene.physics.add.overlap(player, lava, () => { health = 0; takeDamage(scene); });
                scene.physics.add.overlap(player, fireballs, (p, f) => { f.destroy(); takeDamage(scene); });
                scene.physics.add.overlap(iceballs, boss, (b, i) => { if(!i.active) return; i.active = false; i.body.enable = false; i.destroy(); hitBoss(scene, boss, 1); });
                scene.physics.add.collider(player, boss, (p, b) => { if ((!gravityFlipped && p.body.touching.down && b.body.touching.up) || (gravityFlipped && p.body.touching.up && b.body.touching.down)) { p.setVelocityY(gravityFlipped ? 600 : -400); hitBoss(scene, boss, 4); } else { takeDamage(scene); } });
            }
            if(currentLevel === 5 && trueBoss) {
                scene.physics.add.overlap(player, lava, () => { player.setVelocityY(-800); takeDamage(scene); }); 
                scene.physics.add.overlap(iceballs, trueBoss, (b, i) => { if(!i.active) return; i.active = false; i.body.enable = false; i.destroy(); hitBoss(scene, trueBoss, 1); });
                scene.physics.add.collider(player, trueBoss, (p, b) => { if ((!gravityFlipped && p.body.touching.down && b.body.touching.up) || (gravityFlipped && p.body.touching.up && b.body.touching.down)) { p.setVelocityY(gravityFlipped ? 600 : -400); hitBoss(scene, trueBoss, 4); } else { takeDamage(scene); } });
                scene.physics.add.overlap(player, fireballs, (p, f) => { f.destroy(); takeDamage(scene); });
            }

            scene.physics.add.overlap(player, coinsGroup, (p, c) => { let val = c.getData('diamond') ? 100 : 10; c.destroy(); score += val; scoreText.setText('Score: ' + score); SoundEngine.play('coin'); taskState.coinsRun += 1; if (taskState.coinsRun >= 40) taskState.completed[1] = true; updateTaskOverlay(); });
        }

        function update(time, delta) {
            if (!gameActive && !isShopOpen) return; // do not run while shop is open

            if(deathGhost && deathGhost.active) { this.physics.moveToObject(deathGhost, player, 60); }
            if(pet) {
                let closestCoin = null;
                let minDist = 200;
                coinsGroup.getChildren().forEach(c => {
                    let dist = Phaser.Math.Distance.Between(pet.x, pet.y, c.x, c.y);
                    if (dist < minDist) {
                        minDist = dist;
                        closestCoin = c;
                    }
                });
                if (closestCoin) {
                    this.physics.moveToObject(pet, closestCoin, 200);
                } else {
                    pet.body.velocity.x = (player.x - 30 - pet.x) * 0.1;
                    pet.body.velocity.y = (player.y - 30 - pet.y) * 0.1;
                }
            }
            if(currentLevel === 2) { player.body.velocity.x -= 2; } 

            bats.getChildren().forEach(b => { if(Phaser.Math.Distance.Between(b.x, b.y, player.x, player.y) < 400) this.physics.moveToObject(b, player, 150); });
            missiles.getChildren().forEach(m => { this.physics.moveToObject(m, player, 200); m.rotation = Phaser.Math.Angle.Between(m.x, m.y, player.x, player.y); });
            homingFireballs.getChildren().forEach(hf => { this.physics.moveToObject(hf, player, 180); });

            let v = currentSpeed;
            if (!isTwoPlayerMode) {
                if (reverseControls) {
                    if (cursors.left.isDown) { player.setVelocityX(v); player.flipX = false; } else if (cursors.right.isDown) { player.setVelocityX(-v); player.flipX = true; } else player.setVelocityX(0);
                } else {
                    if (cursors.left.isDown) { player.setVelocityX(-v); player.flipX = true; } else if (cursors.right.isDown) { player.setVelocityX(v); player.flipX = false; } else player.setVelocityX(0);
                }
            } else {
                if (reverseControls) {
                    if (keys.A.isDown) { player.setVelocityX(v); player.flipX = false; } else if (keys.D.isDown) { player.setVelocityX(-v); player.flipX = true; } else player.setVelocityX(0);
                } else {
                    if (keys.A.isDown) { player.setVelocityX(-v); player.flipX = true; } else if (keys.D.isDown) { player.setVelocityX(v); player.flipX = false; } else player.setVelocityX(0);
                }
            }

            let isTouchingGround = gravityFlipped ? player.body.touching.up : player.body.touching.down;
            if (isTouchingGround) { canDoubleJump = true; if (isGroundPounding) { this.cameras.main.shake(200, 0.01); explodeParticles(this, player.x, player.y, 0x888888, 15); isGroundPounding = false; } }
            
            if (canJumpTroll && Phaser.Input.Keyboard.JustDown(!isTwoPlayerMode ? cursors.up : keys.W)) {
                let jv = superJumpActive ? 900 : 600;
                if (isTouchingGround) { player.setVelocityY(gravityFlipped ? jv : -jv); SoundEngine.play('jump'); } 
                else if (canDoubleJump) { player.setVelocityY(gravityFlipped ? (jv-100) : -(jv-100)); canDoubleJump = false; SoundEngine.play('jump'); }
                isRedSolid = !isRedSolid;
                updateSwitchBlocks(this);
                SoundEngine.play('coin');
            }

            if ((!isTwoPlayerMode ? cursors.up : cursors.space).isDown) { 
                player.setVelocityY(gravityFlipped ? 300 : -300); 
                explodeParticles(this, player.x, player.y+(gravityFlipped?-15:15), 0xFFA500, 2); 
            }

            // ground pound
            if (!isTouchingGround && (cursors.down.isDown || keys.S.isDown) && !isGroundPounding) {
                isGroundPounding = true;
                player.setVelocityY(1500);
                explodeParticles(this, player.x, player.y, 0xFFFF00, 10);
            }

            if (Phaser.Input.Keyboard.JustDown(gravToggleKey) && score >= 50) { score -= 50; scoreText.setText('Score: ' + score); SoundEngine.play('coin'); flipGravity(this, 3000); }
            if (Phaser.Input.Keyboard.JustDown(superJumpKey)) { superJumpActive = true; SoundEngine.play('coin'); this.time.delayedCall(5000, () => superJumpActive = false); }
            if (Phaser.Input.Keyboard.JustDown(meteorKey)) { let m = fireballs.create(player.x + (player.flipX ? -300 : 300), 0, 'powerTex').setTint(0xFF0000); m.body.allowGravity = true; m.setVelocityY(500); SoundEngine.play('shoot'); }
            
            if (Phaser.Input.Keyboard.JustDown(shrinkKey) && superCharge >= superChargeMax && gameActive && !isShopOpen) {
                fireSuperShot(this);
                superCharge = 0;
                updateSuperChargeUI();
                centerText.setText('SUPER SHOT!').setVisible(true);
                this.time.delayedCall(800, () => { if(gameActive) centerText.setVisible(false); });
            }
            
            // ירייה עם מקש Q (או מקשים אחרים כפי שהיה מקודם)
            let p1Shoot = Phaser.Input.Keyboard.JustDown(keys.Q) || Phaser.Input.Keyboard.JustDown(shootKey) || (!isTwoPlayerMode && Phaser.Input.Keyboard.JustDown(cursors.down));
            if (p1Shoot && hasIcePower && time > lastShotTime + shootDelay) {
                lastShotTime = time;
                SoundEngine.play('shoot');
                if (specialWeapon === 'ultimateIce') {
                    ['-1','0','1'].forEach((offset, index) => {
                        let ice = iceballs.create(player.x, player.y, 'chatGPTImageTex');
                        ice.setVelocityX(player.flipX ? -500 : 500);
                        ice.setVelocityY((index - 1) * 100);
                        ice.body.allowGravity = false;
                        ice.setDisplaySize(40, 40);
                        ice.setData('owner', 'player1');
                    });
                } else {
                    let ice = iceballs.create(player.x, player.y, 'chatGPTImageTex');
                    ice.setVelocityX(player.flipX ? -500 : 500);
                    ice.body.allowGravity = false;
                    ice.setDisplaySize(40, 40);
                    ice.setData('owner', 'player1');
                }
            }
            
            if (Phaser.Input.Keyboard.JustDown(dashKey) && canDash) { canDash = false; player.setVelocityX(player.flipX ? -dashSpeed : dashSpeed); SoundEngine.play('shoot'); isPerfectDodging = true; perfectDodgeTimer = 200; this.time.delayedCall(1000, () => canDash = true); }
            if (Phaser.Input.Keyboard.JustDown(coinRainKey) && !usedCoinRain) { usedCoinRain = true; SoundEngine.play('coin'); for(let i=0; i<20; i++) { let c = coinsGroup.create(player.x + Phaser.Math.Between(-200, 200), player.y - Phaser.Math.Between(300, 600), 'coinTex'); c.setBounce(0.5); c.setCollideWorldBounds(true); } }

            // attack drone logic (new!)
            if (hasDrone && attackDrone && attackDrone.active) {
                // makes the drone hover smoothly above the player
                attackDrone.x += ((player.x + (player.flipX ? 40 : -40)) - attackDrone.x) * 0.1;
                attackDrone.y += ((player.y - 60) - attackDrone.y) * 0.1;

                // shoots the nearest enemy
                if (time > lastDroneShot + 1000) {
                    let nearestEnemy = null;
                    let closestDist = 400; // drone shooting range
                    enemies.getChildren().concat(bats.getChildren()).forEach(e => {
                        let dist = Phaser.Math.Distance.Between(attackDrone.x, attackDrone.y, e.x, e.y);
                        if (dist < closestDist) { closestDist = dist; nearestEnemy = e; }
                    });

                    if (nearestEnemy) {
                        lastDroneShot = time;
                        let plasma = fireballs.create(attackDrone.x, attackDrone.y, 'plasmaTex');
                        plasma.body.allowGravity = false;
                        this.physics.moveToObject(plasma, nearestEnemy, 600);
                        SoundEngine.play('shoot');
                        // define that if the plasma hits an enemy it dies
                        this.physics.add.collider(plasma, enemies, (p, e) => { p.destroy(); e.destroy(); score+=30; scoreText.setText('Score: ' + score); explodeParticles(this, e.x, e.y, 0xFF00FF, 20); });
                        this.physics.add.collider(plasma, bats, (p, e) => { p.destroy(); e.destroy(); score+=40; scoreText.setText('Score: ' + score); explodeParticles(this, e.x, e.y, 0xFF00FF, 20); });
                        this.time.delayedCall(1500, () => { if(plasma.active) plasma.destroy(); }); // remove plasma if it didn't hit
                    }
                }
            }

            if(time % 30000 < 50) { bubbleShield.setAlpha(1); isInvincible = true; this.time.delayedCall(1000, () => { bubbleShield.setAlpha(0); isInvincible = false; }); }
            bubbleShield.x = player.x; bubbleShield.y = player.y;

            if (currentLevel === 3 && boss && boss.getData('isAlive')) {
                boss.setFlipX(player.x < boss.x);
                if (boss.wing) {
                    boss.wing.setFlipX(boss.flipX);
                    boss.wing.x = boss.x + (boss.flipX ? 40 : -40);
                    boss.wing.y = boss.y - 10;
                }
                if (boss.mouth) {
                    boss.mouth.setFlipX(boss.flipX);
                    boss.mouth.x = boss.x + (boss.flipX ? 30 : -30);
                    boss.mouth.y = boss.y + 10;
                }
                bossTalk.setPosition(boss.x, boss.y - 80);
                if (player.x > 2200) bossHealthText.setText('Dragon: ' + boss.getData('hp') + '/10'); else bossHealthText.setText('');
            }
            else if (currentLevel === 5 && trueBoss && trueBoss.getData('isAlive')) {
                trueBoss.setFlipX(player.x < trueBoss.x);
                if (trueBossVideo) {
                    if (trueBossVideo.setFlipX) trueBossVideo.setFlipX(trueBoss.flipX);
                    if (trueBossVideo.setPosition) trueBossVideo.setPosition(trueBoss.x, trueBoss.y);
                }
                if (trueBoss.wing) {
                    trueBoss.wing.setFlipX(trueBoss.flipX);
                    trueBoss.wing.x = trueBoss.x + (trueBoss.flipX ? 45 : -45);
                    trueBoss.wing.y = trueBoss.y - 10;
                }
                if (trueBoss.mouth) {
                    trueBoss.mouth.setFlipX(trueBoss.flipX);
                    trueBoss.mouth.x = trueBoss.x + (trueBoss.flipX ? 40 : -40);
                    trueBoss.mouth.y = trueBoss.y + 20;
                }
                bossTalk.setPosition(trueBoss.x, trueBoss.y - 80);
                if (player.x > 2000) bossHealthText.setText('Void Demon: ' + trueBoss.getData('hp') + '/20'); else bossHealthText.setText('');
            } 
            else bossHealthText.setText('');

            if (player && playerWing) { playerWing.setPosition(player.x - 12, player.y - 10); }
            if (player && playerMouth) { playerMouth.setPosition(player.x + 10, player.y + 8); }
            if (player.y > 600 || player.y < -100) { if(currentLevel !== 3 && currentLevel !== 5) { takeDamage(this); player.x = 100; player.y = 100; player.setVelocity(0); } }

            // Two-player logic
            if (isTwoPlayerMode && player2) {
                // Player 2 movement
                if (key2Left.isDown) { player2.setVelocityX(-currentSpeed); player2.flipX = true; } 
                else if (key2Right.isDown) { player2.setVelocityX(currentSpeed); player2.flipX = false; } 
                else player2.setVelocityX(0);

                // Update player2 wing and mouth positions
                if (player2Wing) { player2Wing.setPosition(player2.x - 12, player2.y - 10); }
                if (player2Mouth) { player2Mouth.setPosition(player2.x + 10, player2.y + 8); }

                let isP2TouchingGround = gravityFlipped ? player2.body.touching.up : player2.body.touching.down;
                if (isP2TouchingGround) { canDoubleJump2 = true; }

                if (canJumpTroll && Phaser.Input.Keyboard.JustDown(key2Jump)) {
                    let jv = superJumpActive ? 900 : 600;
                    if (isP2TouchingGround) { player2.setVelocityY(gravityFlipped ? jv : -jv); SoundEngine.play('jump'); } 
                    else if (canDoubleJump2) { player2.setVelocityY(gravityFlipped ? (jv-100) : -(jv-100)); canDoubleJump2 = false; SoundEngine.play('jump'); }
                }

                // Player 2 shooting
                if (Phaser.Input.Keyboard.JustDown(key2Shoot) && hasIcePower && time > lastShotTime + shootDelay) {
                    lastShotTime = time;
                    SoundEngine.play('shoot');
                    let ice = iceballs.create(player2.x, player2.y, 'chatGPTImageTex');
                    ice.setVelocityX(player2.flipX ? -500 : 500);
                    ice.body.allowGravity = false;
                    ice.setDisplaySize(40, 40);
                    ice.setData('owner', 'player2');
                }

                // Player 2 build blocks
                if (Phaser.Input.Keyboard.JustDown(buildKey2)) {
                    let block = buildBlocks.create(player2.x + (player2.flipX ? -50 : 50), player2.y - 50, 'blockTex');
                    block.setDisplaySize(50, 20);
                    block.body.allowGravity = false;
                    block.body.immovable = true;
                    this.time.delayedCall(10000, () => { if(block && block.active) block.destroy(); });
                }

                if (player2.y > 600 || player2.y < -100) { takeDamage2Player(this); player2.x = 650; player2.y = 450; player2.setVelocity(0); }
            }

            // Player 1 build blocks (עכשיו על מקש E)
            if (Phaser.Input.Keyboard.JustDown(buildKey1) && isTwoPlayerMode) {
                let block = buildBlocks.create(player.x + (player.flipX ? -50 : 50), player.y - 50, 'blockTex');
                block.setDisplaySize(50, 20);
                block.body.allowGravity = false;
                block.body.immovable = true;
                this.time.delayedCall(10000, () => { if(block && block.active) block.destroy(); });
            }

            let scroll = this.cameras.main.scrollX;
            if(bgFront) bgFront.tilePositionX = scroll * 0.6;

            // combo timer
            if (typeof delta !== 'undefined' && comboTimer > 0) {
                comboTimer -= delta;
                if (comboTimer <= 0) {
                    combo = 0;
                    comboText.setText('Combo: 0');
                    if (isRageMode) {
                        isRageMode = false;
                        currentSpeed -= 100;
                    }
                }
            }
            // rage timer
            if (typeof delta !== 'undefined' && rageTimer > 0) {
                rageTimer -= delta;
                if (rageTimer <= 0) {
                    isRageMode = false;
                    currentSpeed -= 100;
                }
            }
            // perfect dodge timer
            if (typeof delta !== 'undefined' && perfectDodgeTimer > 0) {
                perfectDodgeTimer -= delta;
                if (perfectDodgeTimer <= 0) isPerfectDodging = false;
            }
            // falling platforms
            fallingPlatforms.getChildren().forEach(p => {
                if (p.body.touching.up && player.body.touching.down) {
                    if (p.getData('fallTimer') === 0) p.setData('fallTimer', time);
                }
                if (p.getData('fallTimer') > 0 && time - p.getData('fallTimer') > 1000) {
                    p.setVelocityY(200);
                    p.body.allowGravity = true;
                    p.body.immovable = false;
                }
            });
            // hidden walls
            hiddenWalls.getChildren().forEach(w => {
                if (!w.getData('revealed') && Phaser.Geom.Rectangle.Overlaps(player.getBounds(), w.getBounds()) && player.body.velocityY < 0) {
                    w.setAlpha(0);
                    w.body.enable = false;
                    w.setData('revealed', true);
                    // reveal secret
                    for (let i = 0; i < 5; i++) {
                        let coin = coinsGroup.create(w.x + Phaser.Math.Between(-50,50), w.y - 50, 'coinTex');
                        coin.setVelocity(0, -200);
                    }
                }
            });

            updateEnemiesAI(this);

            // weather effects
            if (currentWeather === 'wind' && currentLevel === 4 && player.body.touching.down) {
                player.body.velocity.x += windDirection * 5;
            }

            // bullet time - FIXED CAMERA TINT ISSUE
            if (shiftKey && shiftKey.isDown && stamina > 0) {
                if (this.physics.world.timeScale !== 0.5) {
                    originalSpeed = currentSpeed; // שמירת המהירות הנוכחית לפני ההאטה
                    this.physics.world.timeScale = 0.5;
                    currentSpeed = originalSpeed * 2; // פיצוי על ההאטה כדי שהשחקן יזוז רגיל
                }
                stamina -= 0.5;
                staminaText.setText('Stamina: ' + Math.floor(stamina));
            } else if (shiftKey) {
                if (this.physics.world.timeScale === 0.5) {
                    this.physics.world.timeScale = 1;
                    currentSpeed = originalSpeed; // החזרת המהירות המקורית
                }
                if (stamina < maxStamina) stamina += 0.2;
                staminaText.setText('Stamina: ' + Math.floor(stamina));
            }
        }

        function hitBoss(scene, bTarget, damage) {
            if (!bTarget.getData('isAlive') || bTarget.getData('iFrames')) return;
            bTarget.setData('iFrames', true); scene.time.delayedCall(200, () => { if(bTarget && bTarget.active) bTarget.setData('iFrames', false); });

            let hp = bTarget.getData('hp') - damage;
            bTarget.setData('hp', hp); bTarget.setTint(0xFF0000); scene.time.delayedCall(100, () => bTarget.clearTint()); SoundEngine.play('hit');
            scene.physics.world.pause(); scene.time.delayedCall(50, () => scene.physics.world.resume());
            
            if (hp <= 5 && !bTarget.getData('enraged')) bTarget.setData('enraged', true);
            if (hp <= 0) { 
                bTarget.setData('isAlive', false); explodeParticles(scene, bTarget.x, bTarget.y, 0xFF0000, 50); 
                if (bTarget.wing) bTarget.wing.destroy();
                if (bTarget.mouth) bTarget.mouth.destroy();
                bTarget.destroy(); 
                if (taskState.noDamageRun) { taskState.completed[3] = true; updateTaskOverlay(); }
                if (bTarget === boss) { boss = null; }
                if (bTarget === trueBoss) {
                    if (trueBossVideo) { trueBossVideo.destroy(); trueBossVideo = null; }
                    trueBoss = null;
                }
                if(currentLevel === 3) {
                    centerText.setText('You defeated the dragon! Advancing...').setVisible(true);
                    scene.time.delayedCall(2000, () => {
                        centerText.setVisible(false);
                        setupLevel(scene, 4);
                    });
                } else {
                    gameActive = false; playVictorySequence(scene);
                }
            }
        }
        
        function playVictorySequence(scene) {
            if (victoryOverlay) { victoryOverlay.destroy(); victoryOverlay = null; }
            if (victoryText) { victoryText.destroy(); victoryText = null; }
            if (centerText) centerText.setVisible(false);
            if (bossHealthText) bossHealthText.setText('');
            scene.physics.world.pause();
            victoryOverlay = scene.add.rectangle(400, 300, 800, 600, 0x000000, 0.95).setScrollFactor(0).setDepth(1200);

            const videoElement = document.getElementById('victory-video');
            if (videoElement) {
                videoElement.src = encodeURI('victory_animation.mp4');
                videoElement.style.display = 'block';
                videoElement.currentTime = 0;
                videoElement.loop = false;
                videoElement.muted = true;
                videoElement.onended = () => {
                    if (victoryText) victoryText.setVisible(true);
                };
                const playResult = videoElement.play();
                if (playResult && playResult.catch) {
                    playResult.catch((e) => {
                        console.warn('Victory video play rejected:', e);
                        if (victoryText) victoryText.setVisible(true);
                    });
                }
            }

            victoryText = scene.add.text(400, 540, 'You defeated the terrible dragon!', { fontSize: '32px', fill: '#00FF00', fontStyle: 'bold', align: 'center', wordWrap: { width: 740 } }).setOrigin(0.5).setDepth(1202).setVisible(false);
            scene.time.delayedCall(1000, () => {
                if (victoryText && !victoryText.visible) {
                    victoryText.setVisible(true);
                }
            });
        }

        function healBoss(amount) {
            if(currentLevel === 3 && boss && boss.getData('isAlive')) boss.setData('hp', boss.getData('hp') + amount);
            if(currentLevel === 5 && trueBoss && trueBoss.getData('isAlive')) trueBoss.setData('hp', trueBoss.getData('hp') + amount);
        }

        function flipGravity(scene, duration) {
            if(!gameActive || gravityFlipped) return;
            gravityFlipped = true; scene.physics.world.gravity.y = -1000; player.setTint(0x800080); centerText.setText('Reverse Gravity!').setVisible(true).setFill('#800080');
            scene.time.delayedCall(duration, () => { gravityFlipped = false; scene.physics.world.gravity.y = 1000; player.clearTint(); if(gameActive) centerText.setVisible(false); });
        }

        function getInGamePrice(basePrice) {
            return Math.ceil(basePrice * (permanentUpgrades.shopDiscount ? 0.8 : 1));
        }

        function updatePermanentUI() {
            if(dragonCoinText) dragonCoinText.setText('Dragon Coins: ' + dragonCoins);
            if(permUpgradesText) {
                let active = [];
                if(permanentUpgrades.extraLife) active.push('+1 Life');
                if(permanentUpgrades.longDash) active.push('Long Dash');
                if(permanentUpgrades.shopDiscount) active.push('Shop Discounts');
                permUpgradesText.setText('Upgrades: ' + (active.length ? active.join(' | ') : 'None'));
            }
        }

        function savePermanentProgress() {
            try {
                localStorage.setItem('dragonCoins', dragonCoins.toString());
                localStorage.setItem('permanentUpgrades', JSON.stringify(permanentUpgrades));
            } catch(e) {
                console.warn('Could not save to localStorage', e);
            }
        }

        function loadPermanentProgress() {
            try {
                let storedCoins = parseInt(localStorage.getItem('dragonCoins'), 10);
                if (!isNaN(storedCoins)) dragonCoins = storedCoins;
                let stored = localStorage.getItem('permanentUpgrades');
                if (stored) {
                    let parsed = JSON.parse(stored);
                    permanentUpgrades = Object.assign(permanentUpgrades, parsed);
                }
            } catch(e) {
                console.warn('Could not load data from localStorage', e);
            }
        }

        function updateShopLabels() {
            if (!shopItemTexts || !shopItemTexts.length) return;
            shopItemTexts[0].setText(`1. Fast Ice Rifle [${getInGamePrice(300)} coins]`);
            shopItemTexts[1].setText(`2. Gold Armor (+5 Health) [${getInGamePrice(500)} coins]`);
            shopItemTexts[2].setText(`3. Temporary Bubble Shield [${getInGamePrice(200)} coins]`);
            shopItemTexts[3].setText(`4. Escort Attack Drone [${getInGamePrice(800)} coins]`);
            shopItemTexts[4].setText(`5. Strong Fire Cannon [${getInGamePrice(1000)} coins]`);
            shopItemTexts[5].setText(`6. Secret Player Skin [${getInGamePrice(700)} coins]`);
            shopItemTexts[6].setText(`7. Ultimate Ice Magic [${getInGamePrice(1200)} coins]`);
            shopItemTexts[7].setText(`8. Upgrade Dragon Look [${getInGamePrice(900)} coins]`);
        }

        function takeDamage(scene) {
            if (isInvincible || !gameActive) return;
            health--; healthText.setText('Health: ' + health); SoundEngine.play('hit'); scene.cameras.main.shake(150, 0.01);
            score = Math.max(0, score - 30); scoreText.setText('Score: ' + score); 
            for(let i=0; i<3; i++) { let c = coinsGroup.create(player.x, player.y, 'coinTex'); c.setVelocity(Phaser.Math.Between(-200,200), -200); c.setBounce(0.5); c.setCollideWorldBounds(true); }
            
            isInvincible = true; player.setTint(0xFF0000);
            scene.time.delayedCall(200, () => player.clearTint()); scene.time.delayedCall(400, () => player.setTint(0xFF0000));
            scene.time.delayedCall(1000, () => { isInvincible = false; player.clearTint(); });
            if (health <= 0) { gameActive = false; player.setTint(0xFF0000); centerText.setText('Game Over!\nPress R to restart').setVisible(true).setFill('#FF0000'); }
            taskState.noDamageRun = false;
        }

        function takeDamage2Player(scene) {
            if (isInvincible2 || !gameActive) return;
            player2Health--; player2HealthText.setText('P2 Health: ' + player2Health); SoundEngine.play('hit'); scene.cameras.main.shake(150, 0.01);
            score = Math.max(0, score - 30); scoreText.setText('Score: ' + score); 
            for(let i=0; i<3; i++) { let c = coinsGroup.create(player2.x, player2.y, 'coinTex'); c.setVelocity(Phaser.Math.Between(-200,200), -200); c.setBounce(0.5); c.setCollideWorldBounds(true); }
            
            isInvincible2 = true; player2.setTint(0xFF0000);
            scene.time.delayedCall(200, () => player2.clearTint()); scene.time.delayedCall(400, () => player2.setTint(0xFF0000));
            scene.time.delayedCall(1000, () => { isInvincible2 = false; player2.clearTint(); });
            if (player2Health <= 0) { gameActive = false; player2.setTint(0xFF0000); centerText.setText('Game Over!\nPress R to restart').setVisible(true).setFill('#FF0000'); }
            taskState.noDamageRun = false;
        }

        function takeDamagePlayer1(scene) {
            if (isInvincible || !gameActive) return;
            if (isPerfectDodging) {
                isPerfectDodging = false;
                currentSpeed += 50;
                scene.time.delayedCall(3000, () => currentSpeed -= 50);
                return;
            }
            health--; healthText.setText('Health: ' + health); SoundEngine.play('hit'); scene.cameras.main.shake(150, 0.01);
            score = Math.max(0, score - 30); scoreText.setText('Score: ' + score); 
            for(let i=0; i<3; i++) { let c = coinsGroup.create(player.x, player.y, 'coinTex'); c.setVelocity(Phaser.Math.Between(-200,200), -200); c.setBounce(0.5); c.setCollideWorldBounds(true); }
            
            isInvincible = true; player.setTint(0xFF0000);
            scene.time.delayedCall(200, () => player.clearTint()); scene.time.delayedCall(400, () => player.setTint(0xFF0000));
            scene.time.delayedCall(1000, () => { isInvincible = false; player.clearTint(); });
            scene.physics.world.pause(); scene.time.delayedCall(50, () => scene.physics.world.resume());
            if (health <= 0) { gameActive = false; player.setTint(0xFF0000); centerText.setText('Game Over!\nPress R to restart').setVisible(true).setFill('#FF0000'); }
            taskState.noDamageRun = false;
        }

        function updateEnemiesAI(scene) {
            enemies.getChildren().forEach(e => {
                let dist = Phaser.Math.Distance.Between(e.x, e.y, player.x, player.y);
                if (dist < 300) {
                    e.setTint(0xFF0000);
                    let dir = e.x < player.x ? 1 : -1;
                    e.setVelocityX(dir * 200);
                    e.body.bounce.x = 0;
                } else {
                    e.clearTint();
                    e.body.bounce.x = 1;
                    // velocity will be handled by bounce
                }
            });
        }

        function startWeatherEvent(scene, type) {
            if (currentWeather || currentLevel !== 4) return;
            currentWeather = type;
            if (type === 'rain') {
                rainEmitter = scene.add.particles(0, 0, 'particleTex', {
                    x: { min: 100, max: 700 }, // from cloud areas
                    y: 0,
                    speedY: { min: 200, max: 400 },
                    speedX: { min: -50, max: 50 },
                    scale: { start: 0.5, end: 0 },
                    lifespan: 3000,
                    quantity: 2
                });
                // reduce friction on ground only in level 4
                if (player.body) player.body.friction.x = 0.1;
            } else if (type === 'wind') {
                windEmitter = scene.add.particles(0, 300, 'particleTex', {
                    x: 0,
                    y: { min: 0, max: 600 },
                    speedX: windDirection * 300,
                    speedY: 0,
                    scale: { start: 0.5, end: 0 },
                    lifespan: 2000,
                    quantity: 1
                });
                // wind force will be applied in update only in level 4
            }
        }

        function stopWeather(scene) {
            if (currentWeather === 'rain') {
                if (rainEmitter) rainEmitter.destroy();
                if (player.body) player.body.friction.x = 1;
            } else if (currentWeather === 'wind') {
                if (windEmitter) windEmitter.destroy();
            }
            currentWeather = null;
        }

        function updateSwitchBlocks(scene) {
            redBlocks.getChildren().forEach(b => {
                b.body.enable = isRedSolid;
                b.setAlpha(isRedSolid ? 1 : 0.3);
            });
            blueBlocks.getChildren().forEach(b => {
                b.body.enable = !isRedSolid;
                b.setAlpha(!isRedSolid ? 1 : 0.3);
            });
        }

        function startBossAI(scene) {
            scene.time.addEvent({ delay: 1500, loop: true, callback: () => {
                if (!gameActive) return;
                if (currentLevel === 3 && boss && boss.getData('isAlive')) { boss.setVelocityY(boss.getData('enraged') ? -500 : -400); boss.setVelocityX(player.x < boss.x ? -150 : 150); }
                if (currentLevel === 5 && trueBoss && trueBoss.getData('isAlive')) { trueBoss.setVelocityY(-300); trueBoss.setVelocityX(player.x < trueBoss.x ? -100 : 100); }
            }});
            scene.time.addEvent({ delay: 3000, loop: true, callback: () => {
                if (!gameActive) return;
                if (currentLevel === 3 && boss && boss.getData('isAlive') && player.x > 2000) {
                    let water = homingFireballs.create(boss.x, boss.y, 'blueFireTex').setScale(1.2);
                    water.body.allowGravity = false;
                    scene.physics.moveToObject(water, player, 300);
                }
                if (currentLevel === 5 && trueBoss && trueBoss.getData('isAlive') && player.x > 2000) {
                    let ms = missiles.create(trueBoss.x, trueBoss.y, 'missileTex');
                    ms.body.allowGravity = false;
                    scene.physics.moveToObject(ms, player, 400);
                    let hfb = homingFireballs.create(trueBoss.x, trueBoss.y, 'blueFireTex');
                    hfb.body.allowGravity = false;
                    scene.physics.moveToObject(hfb, player, 250);
                }
            }});
            scene.time.addEvent({ delay: 8000, loop: true, callback: () => {
                if (!gameActive || !boss || !boss.getData('isAlive') || currentLevel !== 3) return;
                let fb = fireballs.create(player.x + Phaser.Math.Between(-100, 100), 550, 'powerTex').setTint(0xFF4500); fb.body.allowGravity = true; fb.setVelocityY(-600);
            }});
        }

        function startTrollEvents(scene) {
            if (isTwoPlayerMode || trollEventsStarted || isCurseActive) return; // Disable troll events in two-player mode or on repeat
            trollEventsStarted = true;
            trollEventHandles.push(scene.time.addEvent({ delay: 25000, loop: true, callback: () => {
                if(!gameActive) return; triggerDarknessSequence(scene);
            }}));
            trollEventHandles.push(scene.time.addEvent({ delay: 28000, loop: true, callback: () => {
                if(!gameActive) return; canJumpTroll = false; centerText.setText('Heavy Curse!').setVisible(true).setFill('#800080'); scene.time.delayedCall(3000, () => { canJumpTroll = true; if(gameActive) centerText.setVisible(false); });
            }}));
            trollEventHandles.push(scene.time.addEvent({ delay: 22000, loop: true, callback: () => {
                if(!gameActive) return; currentSpeed = 80; centerText.setText('Snail!').setVisible(true).setFill('#00FF00'); scene.time.delayedCall(4000, () => { currentSpeed = 250; if(gameActive) centerText.setVisible(false); });
            }}));
            trollEventHandles.push(scene.time.addEvent({ delay: 18000, loop: true, callback: () => {
                if(!gameActive) return; for(let i=0; i<10; i++) { let d = poisonDrops.create(player.x + Phaser.Math.Between(-400, 400), -50, 'poisonDropTex'); d.body.allowGravity = true; }
            }}));
            trollEventHandles.push(scene.time.addEvent({ delay: 45000, loop: true, callback: () => {
                if(!gameActive) return; scene.cameras.main.rotation = Math.PI; centerText.setText('Upside-down Camera!').setVisible(true).setFill('#FF00FF'); scene.time.delayedCall(3000, () => { scene.cameras.main.rotation = 0; if(gameActive) centerText.setVisible(false); });
            }}));
            trollEventHandles.push(scene.time.addEvent({ delay: 20000, loop: true, callback: () => {
                if(!gameActive) return; scene.cameras.main.shake(1000, 0.02); reverseControls = true; centerText.setText('Earthquake!').setVisible(true).setFill('#FF8C00'); scene.time.delayedCall(2000, () => { reverseControls = false; if(gameActive && !scene.cameras.main.rotation) centerText.setVisible(false); });
            }}));
            trollEventHandles.push(scene.time.addEvent({ delay: 13000, loop: true, callback: () => {
                if(!gameActive) return; let spike = fallingSpikes.create(player.x, 0, 'spikeTex'); spike.body.allowGravity = true; spike.setVelocityY(400);
            }}));
            trollEventHandles.push(scene.time.addEvent({ delay: 35000, loop: true, callback: () => {
                if(!gameActive || bombActive || currentLevel === 4) return;
                bombActive = true; bombTimer = 10; bombText.setVisible(true);
                defuseOrbs.create(player.x + Phaser.Math.Between(-300, 300), 400, 'defuseTex'); 
                let bInterval = setInterval(() => {
                    if(!bombActive) { clearInterval(bInterval); return; }
                    bombTimer--; bombText.setText(bombTimer);
                    if(bombTimer <= 0) { clearInterval(bInterval); bombActive = false; bombText.setVisible(false); takeDamage(scene); takeDamage(scene); explodeParticles(scene, player.x, player.y, 0xFF0000, 50); }
                }, 1000);
            }}));
        }
    </script>
</body>
</html>
