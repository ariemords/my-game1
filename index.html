<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer Ultimate - THE TOTAL EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: Arial, sans-serif; }
        #game-container { box-shadow: 0 0 30px rgba(0,0,0,0.8); border-radius: 10px; overflow: hidden; position: relative; }
        #shop-ui { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95); border: 4px solid #FFD700; padding: 20px; border-radius: 15px;
            z-index: 1000; width: 450px; text-align: center; direction: rtl; box-shadow: 0 0 50px #000;
        }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .item { background: #333; padding: 10px; border: 1px solid #555; cursor: pointer; transition: 0.2s; border-radius: 8px; }
        .item:hover { background: #444; border-color: #FFD700; transform: scale(1.05); }
        .close-btn { background: #ff4444; color: white; border: none; padding: 8px 20px; cursor: pointer; margin-top: 15px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="shop-ui">
        <h2 style="color:#FFD700; margin-top:0;">💰 חנות השדרוגים 💰</h2>
        <p>מטבעות זמינים: <span id="shop-coins">0</span></p>
        <div class="shop-grid">
            <div class="item" onclick="buyWeapon('laser')">🔫 לייזר מהיר (250)</div>
            <div class="item" onclick="buyWeapon('void')">🌑 תותח ריק ענקי (600)</div>
            <div class="item" onclick="buySkin(0x0000FF)">👤 נינג'ה כחול (150)</div>
            <div class="item" onclick="buySkin(0xFFD700)">🤖 רובוט זהב (400)</div>
            <div class="item" onclick="buySkin(0xFF0000)">👹 שד אדום (200)</div>
            <div class="item" onclick="buySkin(0x00FF00)">👽 יצור חלל (300)</div>
            <div class="item" onclick="buySkin(0xFF00FF)">🕶️ סוכן חשאי (500)</div>
            <div class="item" onclick="buySkin(0xFFFFFF)">🛡️ אביר פלדה (חופשי)</div>
        </div>
        <button class="close-btn" onclick="toggleShop()">סגור חנות (B)</button>
    </div>
    <div id="game-container"></div>
    
    <script>
        const SoundEngine = {
            ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(type) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.connect(gain); gain.connect(this.ctx.destination); const now = this.ctx.currentTime;
                if (type === 'jump') { osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(600, now + 0.1); gain.gain.setValueAtTime(0.04, now); osc.start(); osc.stop(now + 0.1); } 
                else if (type === 'coin') { osc.type = 'sine'; osc.frequency.setValueAtTime(900, now); gain.gain.setValueAtTime(0.04, now); osc.start(); osc.stop(now + 0.2); } 
                else if (type === 'hit') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); gain.gain.setValueAtTime(0.08, now); osc.start(); osc.stop(now + 0.3); } 
                else if (type === 'shoot') { osc.type = 'triangle'; osc.frequency.setValueAtTime(800, now); gain.gain.setValueAtTime(0.05, now); osc.start(); osc.stop(now + 0.1); }
            }
        };

        const config = { type: Phaser.AUTO, width: 800, height: 600, parent: 'game-container', physics: { default: 'arcade', arcade: { gravity: { y: 1000 }, debug: false } }, scene: { create: create, update: update } };
        const game = new Phaser.Game(config);
        
        let player, ground, platforms, iceGround, mysteryBlocks, powerUps, enemies, bats, boss, trueBoss;
        let fireballs, missiles, fallingSpikes, springs, healSprings, iceballs, coinsGroup, goals, lasers, lava, defuseOrbs;
        let portals, fakeCoins, homingFireballs, deathGhost, poisonDrops, badSprings;
        let cursors, keys, score = 0, health = 3, currentLevel = 1;
        let gameActive = false, isInvincible = false, currentSpeed = 250, hasIcePower = true;
        let lastShotTime = 0, canDoubleJump = false, canDash = true, usedCoinRain = false, gravityFlipped = false;
        let reverseControls = false, isTiny = false, bombActive = false, bombTimer = 0, superJumpActive = false, canJumpTroll = true;
        let scoreText, healthText, bossHealthText, centerText, levelText, bombText, pet, bubbleShield, currentWeapon = 'ice';

        function createTextures(scene) {
            let g = scene.make.graphics({ x: 0, y: 0, add: false });
            // הגיבור המשופר
            g.fillStyle(0x333333); g.fillRect(4, 2, 24, 28); 
            g.fillStyle(0x555555); g.fillRect(6, 4, 20, 10); 
            g.fillStyle(0x00FFFF); g.fillRect(8, 6, 16, 4); 
            g.fillStyle(0x777777); g.fillRect(2, 12, 6, 12); g.fillRect(24, 12, 6, 12);
            g.generateTexture('playerTex', 32, 32); g.clear();
            // הדרקון המכני המשופר
            g.fillStyle(0x666666); g.fillTriangle(60, 40, 0, 0, 120, 20); 
            g.fillStyle(0x888888); g.fillRoundedRect(40, 30, 80, 45, 10);
            g.fillStyle(0x999999); g.fillRect(10, 25, 45, 30);
            g.fillStyle(0xFF0000); g.fillCircle(20, 35, 5);
            g.fillStyle(0xCCCCCC); for(let i=0; i<4; i++) { g.fillTriangle(50+(i*20), 30, 60+(i*20), 10, 70+(i*20), 30); }
            g.generateTexture('realDragon', 190, 100); g.clear();
            // כל שאר הטקסטורות המקוריות
            g.fillStyle(0x800080); g.fillCircle(16,16,14); g.generateTexture('enemyTex', 32, 32); g.clear();
            g.fillStyle(0xFF0000); g.fillCircle(16,16,14); g.generateTexture('thiefTex', 32, 32); g.clear();
            g.fillStyle(0x222222); g.fillRect(12,12,8,8); g.generateTexture('batTex', 32, 32); g.clear();
            g.fillStyle(0x8B4513); g.fillRect(0,0,400,40); g.fillStyle(0x228B22); g.fillRect(0,0,400,8); g.generateTexture('groundTex', 400, 40); g.clear();
            g.fillStyle(0x00FFFF, 0.5); g.fillRect(0,0,400,40); g.generateTexture('iceGroundTex', 400, 40); g.clear();
            g.fillStyle(0xDEB887); g.fillRect(0,0,150,20); g.generateTexture('platTex', 150, 20); g.clear();
            g.fillStyle(0xFFD700); g.fillRect(0,0,32,64); g.generateTexture('goalTex', 32, 64); g.clear();
            g.fillStyle(0xFFFF00); g.fillCircle(8,8,8); g.generateTexture('coinTex', 16, 16); g.clear();
            g.fillStyle(0x00FFFF); g.fillCircle(8,8,8); g.generateTexture('iceTex', 16, 16); g.clear();
            g.fillStyle(0xFFFFFF, 0.4); g.fillCircle(16,16,16); g.generateTexture('bubbleTex', 32, 32); g.clear();
            g.fillStyle(0xFF4500); g.fillRect(0,0,800,40); g.generateTexture('lavaTex', 800, 40); g.clear();
            g.fillStyle(0xFF0000); g.fillRect(0,0,10,600); g.generateTexture('laserTex', 10, 600); g.clear();
            g.fillStyle(0x32CD32); g.fillRect(0,0,32,16); g.generateTexture('springTex', 32, 16); g.clear();
            g.fillStyle(0x0000FF); g.fillRect(0,0,32,16); g.generateTexture('healSpringTex', 32, 16); g.clear();
            g.fillStyle(0xFF8C00); g.fillRect(0,0,40,40); g.generateTexture('blockTex', 40, 40); g.clear();
            g.fillStyle(0xFF0000); g.fillRect(0,0,40,40); g.generateTexture('mimicTex', 40, 40); g.clear();
            g.fillStyle(0xFFFFFF); g.fillCircle(4,4,4); g.generateTexture('particleTex', 8, 8); g.clear();
            g.fillStyle(0xFFFF00); g.fillCircle(6,6,6); g.generateTexture('petTex', 12, 12); g.clear();
            g.fillStyle(0x555555); g.fillRect(0,0,20,10); g.generateTexture('missileTex', 26, 10); g.clear();
            g.fillStyle(0x00FFFF); g.fillTriangle(8,0,16,32,0,32); g.generateTexture('spikeTex', 16, 32); g.clear();
            g.fillStyle(0x00FF00); g.fillCircle(12,12,12); g.generateTexture('defuseTex', 24, 24); g.clear();
            g.fillStyle(0x00FFFF); g.fillTriangle(8,0,16,8,8,16); g.generateTexture('diamondTex', 16, 16); g.clear();
            g.fillStyle(0x0000FF, 0.5); g.fillCircle(16,16,16); g.generateTexture('portalTex', 32, 32); g.clear();
            g.fillStyle(0xFF0000); g.fillCircle(8,8,8); g.generateTexture('fakeCoinTex', 16, 16); g.clear();
            g.fillStyle(0x0000FF); g.fillCircle(12,12,12); g.generateTexture('blueFireTex', 24, 24); g.clear();
            g.fillStyle(0x222222, 0.9); g.fillCircle(16,16,16); g.generateTexture('ghostTex', 32, 32); g.clear();
            g.fillStyle(0x00FF00); g.fillCircle(4,4,4); g.generateTexture('poisonDropTex', 8, 8); g.clear();
            g.fillStyle(0xFF0000); g.fillRect(0,0,32,16); g.generateTexture('badSpringTex', 32, 16); g.clear();
        }

        function explodeParticles(scene, x, y, color, qty = 15) { let emitter = scene.add.particles(x, y, 'particleTex', { speed: { min: -150, max: 150 }, angle: { min: 0, max: 360 }, scale: { start: 1, end: 0 }, tint: color, lifespan: 600, gravityY: 300, quantity: qty, emitting: false }); emitter.explode(); }

        function create() {
            createTextures(this);
            scoreText = this.add.text(16, 16, 'ניקוד: 0', { fontSize: '24px', fill: '#FFF', stroke: '#000', strokeThickness: 3 }).setScrollFactor(0).setDepth(200);
            healthText = this.add.text(16, 50, 'חיים: 3', { fontSize: '24px', fill: '#FFF', stroke: '#000', strokeThickness: 3 }).setScrollFactor(0).setDepth(200);
            levelText = this.add.text(400, 16, 'שלב: 1', { fontSize: '24px', fill: '#FFF' }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(200);
            bossHealthText = this.add.text(600, 16, '', { fontSize: '24px', fill: '#F00' }).setScrollFactor(0).setDepth(200);
            bombText = this.add.text(400, 80, '', { fontSize: '40px', fill: '#F00' }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(200).setVisible(false);
            centerText = this.add.text(400, 300, 'W: קפיצה | B: חנות | רווח: תעופה\nX: ירי | R: איפוס | G: גרוויטציה', { fontSize: '22px', fill: '#FFF', align: 'center' }).setOrigin(0.5).setScrollFactor(0).setDepth(200);

            cursors = this.input.keyboard.createCursorKeys();
            keys = this.input.keyboard.addKeys('W,A,D,SPACE,B,X,Z,G,R,S,U,C');

            this.input.keyboard.on('keydown-W', () => { if(!gameActive) { gameActive = true; centerText.setVisible(false); SoundEngine.init(); if(currentLevel === 3 || currentLevel === 5) startBossAI(this); } });
            this.input.keyboard.on('keydown-B', toggleShop);
            this.input.keyboard.on('keydown-R', () => window.location.reload());

            setupLevel(this, 1);
        }

        function setupLevel(scene, level) {
            currentLevel = level; scene.physics.world.timeScale = 1; reverseControls = false; gravityFlipped = false; isTiny = false; bombActive = false; bombText.setVisible(false); superJumpActive = false; canJumpTroll = true; currentSpeed = 250;
            if(levelText) levelText.setText('שלב: ' + level);

            let groups = [ground, platforms, iceGround, mysteryBlocks, enemies, bats, goals, springs, healSprings, lasers, lava, fireballs, missiles, fallingSpikes, iceballs, coinsGroup, powerUps, defuseOrbs, portals, fakeCoins, homingFireballs, poisonDrops, badSprings];
            groups.forEach(g => { if(g) g.clear(true, true); });

            ground = scene.physics.add.staticGroup(); platforms = scene.physics.add.staticGroup(); iceGround = scene.physics.add.staticGroup(); mysteryBlocks = scene.physics.add.staticGroup();
            goals = scene.physics.add.staticGroup(); springs = scene.physics.add.staticGroup(); healSprings = scene.physics.add.staticGroup(); lasers = scene.physics.add.staticGroup(); lava = scene.physics.add.staticGroup();
            enemies = scene.physics.add.group(); bats = scene.physics.add.group({allowGravity: false}); fireballs = scene.physics.add.group({allowGravity: false}); missiles = scene.physics.add.group({allowGravity: false}); fallingSpikes = scene.physics.add.group(); iceballs = scene.physics.add.group({allowGravity: false}); coinsGroup = scene.physics.add.group();
            powerUps = scene.physics.add.group(); defuseOrbs = scene.physics.add.staticGroup(); portals = scene.physics.add.staticGroup(); fakeCoins = scene.physics.add.staticGroup(); homingFireballs = scene.physics.add.group({allowGravity: false});
            poisonDrops = scene.physics.add.group(); badSprings = scene.physics.add.staticGroup();

            scene.physics.world.setBounds(0, 0, 3200, 600); scene.cameras.main.setBounds(0, 0, 3200, 600);
            scene.physics.world.gravity.y = 1000;

            scene.cameras.main.setBackgroundColor(level === 3 ? '#800' : (level === 5 ? '#102' : '#4CA1AF'));

            for (let x = 0; x < 3200; x += 400) {
                if (level === 3 && x > 400) lava.create(x, 590, 'lavaTex');
                else if (level === 5) lava.create(x, 590, 'lavaTex');
                else ground.create(x + 200, 580, 'groundTex');
            }
            if(level === 5) ground.create(200, 580, 'groundTex');

            if (!player) {
                player = scene.physics.add.sprite(100, 450, 'playerTex').setBounce(0.1).setCollideWorldBounds(true).setDepth(50);
                scene.cameras.main.startFollow(player, true, 0.05, 0.05);
                bubbleShield = scene.add.image(0, 0, 'bubbleTex').setAlpha(0).setDepth(51);
                pet = scene.add.image(100, 400, 'petTex').setDepth(52); 
            } else { player.x = 100; player.y = 450; player.setVelocity(0); player.setScale(1); }

            deathGhost = scene.physics.add.sprite(3000, 100, 'ghostTex').setAlpha(0.8).setDepth(60); deathGhost.body.allowGravity = false;

            if (level === 1) {
                [600, 1200, 1800].forEach(x => platforms.create(x, 450, 'platTex'));
                [800, 1500, 2200].forEach(x => enemies.create(x, 500, 'enemyTex').setVelocityX(100).setBounceX(1).setCollideWorldBounds(true));
                mysteryBlocks.create(400, 250, 'blockTex'); springs.create(1000, 550, 'springTex');
            } else if (level === 3) {
                boss = scene.physics.add.sprite(2800, 300, 'realDragon').setCollideWorldBounds(true).setData('hp', 15).setData('isAlive', true);
                boss.body.allowGravity = false;
            } else if (level === 5) {
                trueBoss = scene.physics.add.sprite(2800, 200, 'realDragon').setScale(1.5).setTint(0x8888FF).setData('hp', 30).setData('isAlive', true);
                trueBoss.body.allowGravity = false;
            }

            goals.create(3100, 520, 'goalTex');
            setupCollisions(scene);
            if(level === 1) startTrollEvents(scene);
        }

        function setupCollisions(scene) {
            scene.physics.add.collider(player, [ground, platforms, iceGround]);
            scene.physics.add.collider(enemies, [ground, platforms, iceGround]);
            scene.physics.add.collider(coinsGroup, [ground, platforms]);
            scene.physics.add.overlap(player, goals, () => { if(currentLevel < 5) setupLevel(scene, currentLevel + 1); });
            scene.physics.add.overlap(player, deathGhost, () => takeDamage(scene));
            scene.physics.add.overlap(player, coinsGroup, (p, c) => { c.destroy(); score += 10; scoreText.setText('ניקוד: ' + score); SoundEngine.play('coin'); });
            scene.physics.add.overlap(iceballs, enemies, (i, e) => { i.destroy(); e.destroy(); explodeParticles(scene, e.x, e.y, 0x800080); score += 20; scoreText.setText('ניקוד: ' + score); });
            
            if(currentLevel === 3 || currentLevel === 5) {
                let b = currentLevel === 3 ? boss : trueBoss;
                scene.physics.add.overlap(iceballs, b, (i, target) => { i.destroy(); hitBoss(scene, target, 1); });
            }
            scene.physics.add.collider(player, enemies, (p, e) => { if(p.body.velocity.y > 0) e.destroy(); else takeDamage(scene); });
            scene.physics.add.overlap(player, lava, () => { health = 0; takeDamage(scene); });
        }

        function update(time) {
            if (!gameActive) return;
            if(deathGhost) this.physics.moveToObject(deathGhost, player, 60);
            if(pet) { pet.x += (player.x - 30 - pet.x) * 0.05; pet.y += (player.y - 30 - pet.y) * 0.05; }

            let v = currentSpeed;
            if (keys.A.isDown || cursors.left.isDown) { player.setVelocityX(reverseControls ? v : -v); player.flipX = !reverseControls; }
            else if (keys.D.isDown || cursors.right.isDown) { player.setVelocityX(reverseControls ? -v : v); player.flipX = reverseControls; }
            else player.setVelocityX(0);

            if ((keys.W.isDown || cursors.up.isDown) && player.body.touching.down) { player.setVelocityY(gravityFlipped ? 600 : -600); SoundEngine.play('jump'); }
            if (keys.SPACE.isDown) { player.setVelocityY(gravityFlipped ? 300 : -300); }

            if (Phaser.Input.Keyboard.JustDown(keys.X) && time > lastShotTime + (currentWeapon === 'laser' ? 150 : 500)) {
                lastShotTime = time; SoundEngine.play('shoot');
                let shot = iceballs.create(player.x, player.y, 'iceTex');
                if(currentWeapon === 'void') shot.setScale(3).setTint(0x000);
                else if(currentWeapon === 'laser') shot.setTint(0xF00);
                shot.setVelocityX(player.flipX ? -600 : 600);
            }

            if (Phaser.Input.Keyboard.JustDown(keys.G) && score >= 50) { score -= 50; gravityFlipped = !gravityFlipped; scene.physics.world.gravity.y = gravityFlipped ? -1000 : 1000; scoreText.setText('ניקוד: ' + score); }
            if (Phaser.Input.Keyboard.JustDown(keys.S)) { isTiny = !isTiny; player.setScale(isTiny ? 0.5 : 1); }
            
            if (currentLevel === 3 && boss && boss.getData('isAlive')) bossHealthText.setText('בוס: ' + boss.getData('hp'));
            if (currentLevel === 5 && trueBoss && trueBoss.getData('isAlive')) bossHealthText.setText('בוס סופי: ' + trueBoss.getData('hp'));
        }

        function hitBoss(scene, b, dmg) {
            let hp = b.getData('hp') - dmg; b.setData('hp', hp); b.setTint(0xFF0000); scene.time.delayedCall(100, () => b.clearTint());
            if(hp <= 0) { b.destroy(); b.setData('isAlive', false); explodeParticles(scene, b.x, b.y, 0xFF0000, 50); }
        }

        function takeDamage(scene) {
            if (isInvincible) return; health--; healthText.setText('חיים: ' + health); SoundEngine.play('hit'); scene.cameras.main.shake(150, 0.01);
            if (health <= 0) { gameActive = false; centerText.setText('פסילה! R להתחלה').setVisible(true); }
            isInvincible = true; scene.time.delayedCall(1000, () => isInvincible = false);
        }

        function toggleShop() {
            const ui = document.getElementById('shop-ui');
            const visible = ui.style.display === 'block';
            ui.style.display = visible ? 'none' : 'block';
            document.getElementById('shop-coins').innerText = score;
            gameActive = visible; 
        }

        function buyWeapon(type) {
            let cost = type === 'laser' ? 250 : 600;
            if (score >= cost) { score -= cost; currentWeapon = type; toggleShop(); scoreText.setText('ניקוד: ' + score); }
        }

        function buySkin(color) {
            let cost = color === 0xFFFFFF ? 0 : 200;
            if (score >= cost) { score -= cost; player.setTint(color); toggleShop(); scoreText.setText('ניקוד: ' + score); }
        }

        function startBossAI(scene) {
            scene.time.addEvent({ delay: 2000, loop: true, callback: () => {
                if(!gameActive) return;
                let b = currentLevel === 3 ? boss : trueBoss;
                if(b && b.getData('isAlive')) { let f = fireballs.create(b.x, b.y, 'coinTex').setTint(0xF00); scene.physics.moveToObject(f, player, 350); }
            }});
        }

        function startTrollEvents(scene) {
            scene.time.addEvent({ delay: 20000, loop: true, callback: () => { if(gameActive) { reverseControls = true; scene.time.delayedCall(5000, () => reverseControls = false); } }});
            scene.time.addEvent({ delay: 12000, loop: true, callback: () => { if(gameActive) { let s = fallingSpikes.create(player.x, 0, 'spikeTex'); s.body.allowGravity = true; } }});
        }
    </script>
</body>
</html>
